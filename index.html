    const st=DB.staff_users.find(x=>x.id===data)||{};
    const prev=myApproverDecision(APP.month,data);
    c=`<div class="mt">Conditional approval — ${st.name||''} <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="alert" style="font-size:11px;background:#d9770622;border:1px solid #d9770644;color:#fbbf24"><i class="ti ti-clock"></i> Approve with a condition. The Director will see this note before releasing.</div>
    <label class="lbl">Condition / remark (required)</label>
    <textarea id="rm_txt" class="inp" rows="4" style="resize:vertical" placeholder="e.g. Release salary on the 15th · Hold until loan cleared · Pay after attendance fix…">${prev&&prev.status==='conditional'?(prev.remarks||''):''}</textarea>
    <button class="btn" style="width:100%;margin-top:10px;padding:10px;background:#d97706;color:#fff" onclick="submitRemark('${data}','conditional')"><i class="ti ti-clock"></i> Approve with condition</button>`;
  }

  // Release only part of a salary now; the balance stays pending (and can be delegated).
  if(type==='partial_release'){
    const [sid,m]=(data||'').split('|');
    const st=DB.staff_users.find(x=>x.id===sid)||Object.values(DB.monthly_additions||{}).reduce((a,b)=>a.concat(b),[]).find(x=>x.id===sid)||{};
    const sl=calcSlip(sid,m);
    const net=sl?sl.net:0;
    const already=releasedAmount(m,sid);
    const remaining=net-already;
    c=`<div class="mt"><span style="display:flex;align-items:center;gap:8px"><i class="ti ti-coins" style="color:#34d399"></i> Partial Release — ${st.name||''}</span> <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="alert ai" style="font-size:11px"><i class="ti ti-info-circle"></i> Release part of the salary now when the full amount can't be transferred at once. The balance stays pending — release it later or delegate it to the Admin.</div>
    <div style="background:var(--inset);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px">
      <div style="display:flex;justify-content:space-between;padding:3px 0"><span class="tm">Net salary</span><span style="font-weight:700;color:var(--text)">Rs${net.toLocaleString()}</span></div>
      ${already>0?`<div style="display:flex;justify-content:space-between;padding:3px 0"><span class="tm">Already released</span><span style="font-weight:700;color:#34d399">Rs${already.toLocaleString()}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;padding:5px 0 1px;border-top:1px solid #1e293b;margin-top:4px"><span class="tm">Remaining to release</span><span style="font-weight:700;color:#fb923c">Rs${remaining.toLocaleString()}</span></div>
    </div>
    ${remaining<=0?`<div class="alert aw" style="font-size:12px"><i class="ti ti-alert-triangle"></i> Nothing remaining to release.</div>`:
    `<label class="lbl">Amount to release now (max Rs${remaining.toLocaleString()})</label>
    <input id="pr_amt" type="number" min="1" max="${remaining}" class="inp" placeholder="e.g. ${Math.max(1,remaining-1000).toLocaleString()}" oninput="prUpdateHint('${remaining}')" onkeydown="if(event.key==='Enter')submitPartialRelease('${sid}','${m}')">
    <div id="pr_hint" class="tm" style="margin:6px 0 12px;min-height:14px"></div>
    <button class="btn bgr" style="width:100%;padding:11px" onclick="submitPartialRelease('${sid}','${m}')"><i class="ti ti-send"></i> Release amount</button>`}`;
  }

  // Staff: view their own salary slip in a modal (and sign it if released).
  if(type==='view_slip'){
    const [uid,mm]=(data||'').split('|');
    const sl=calcSlip(uid,mm);
    const released=staffReleased(mm,uid);
    const signed=released?receiptDate(mm,uid):null;
    c=`<div class="mt"><span style="display:flex;align-items:center;gap:8px"><i class="ti ti-file-invoice" style="color:#60a5fa"></i> Salary Slip — ${mm}</span> <button class="xbtn" onclick="closeModal()">×</button></div>
    ${!released?`<div class="alert aw" style="font-size:12px"><i class="ti ti-clock"></i> This salary hasn't been released yet — you can review the breakdown, but signing opens once it's released.</div>`:''}
    ${sl?slipHTML(sl,signed,mm,uid,released):'<div class="alert aw" style="font-size:12px"><i class="ti ti-info-circle"></i> No salary record for this month.</div>'}
    ${sl&&staffIssued(mm,uid)?`<button class="btn bou" style="width:100%;margin-top:12px;padding:10px" onclick="downloadMySlip('${mm}','${uid}')"><i class="ti ti-download"></i> Download PDF</button>`:''}`;
  }

  // Staff: month-wise earnings & deductions for a year, each with a slip shortcut.
  if(type==='year_breakdown'){
    const [sid,yr]=(data||'').split('|');
    const st=DB.staff_users.find(x=>x.id===sid)||{};
    const months=Object.keys(DB.salary_sheets||{}).filter(mm=>mm.startsWith(yr+'-')&&(DB.salary_sheets[mm]||{})[sid]).sort();
    let tN=0,tD=0,tS=0;
    const rows=months.map(mm=>{
      const s=calcSlip(sid,mm); if(!s) return '';
      tN+=s.net; tD+=s.deduction; tS+=s.secDed;
      return `<tr>
        <td style="white-space:nowrap">${fmtMonthLabel(mm)}</td>
        <td style="text-align:right;color:#34d399;font-weight:600">Rs${s.net.toLocaleString()}</td>
        <td style="text-align:right;color:#f87171">${s.deduction>0?'-Rs'+s.deduction.toLocaleString():'—'}</td>
        <td style="text-align:right"><button class="btn bou bsm" title="View slip for ${fmtMonthLabel(mm)}" onclick="openModal('view_slip','${sid}|${mm}')"><i class="ti ti-file-invoice"></i></button></td>
      </tr>`;
    }).join('');
    c=`<div class="mt"><span style="display:flex;align-items:center;gap:8px"><i class="ti ti-report-money" style="color:#fbbf24"></i> ${yr} — Month-wise Breakdown</span> <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="tm" style="margin-bottom:10px">${st.name||''} · earnings and deductions for each processed month. Tap a slip icon to open that month.</div>
    ${months.length?`<div style="overflow-x:auto"><table style="min-width:420px"><thead><tr><th>Month</th><th style="text-align:right">Earned (Net)</th><th style="text-align:right">Deductions</th><th style="text-align:right">Slip</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td style="font-weight:700;border-top:2px solid var(--border)">Total</td>
      <td style="text-align:right;font-weight:800;color:#34d399;border-top:2px solid var(--border)">Rs${tN.toLocaleString()}</td>
      <td style="text-align:right;font-weight:700;color:#f87171;border-top:2px solid var(--border)">-Rs${tD.toLocaleString()}</td>
      <td style="border-top:2px solid var(--border)"></td></tr>
      <tr><td colspan="4" class="tm" style="padding-top:8px">Security deducted in ${yr}: Rs${tS.toLocaleString()}</td></tr>
    </tfoot></table></div>`
    :`<div class="alert aw" style="font-size:12px"><i class="ti ti-info-circle"></i> No salary sheets have been generated for ${yr} yet.</div>`}`;
  }

  // Director: view staff's own remarks (entered via edit staff or temp staff form).
  if(type==='staff_remark'){
    const st=DB.staff_users.find(x=>x.id===data)||Object.values(DB.monthly_additions||{}).reduce((a,b)=>a.concat(b),[]).find(x=>x.id===data)||{};
    c=`<div class="mt">Remarks — ${st.name||''} <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="alert ai" style="font-size:11px;white-space:pre-wrap">${st.remarks||'No remarks.'}</div>`;
  }

  // Director: staff bank account details.
  if(type==='account_details'){
    const st=DB.staff_users.find(x=>x.id===data)||Object.values(DB.monthly_additions||{}).reduce((a,b)=>a.concat(b),[]).find(x=>x.id===data)||{};
    const has=st.bank_name||st.account_no||st.account_title;
    const row=(lbl,val)=>`<div style="display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid #1e293b">
      <span class="tm">${lbl}</span><span style="font-weight:600;color:var(--text);text-align:right;word-break:break-all">${val||'<span style=\"color:var(--text3)\">—</span>'}</span></div>`;
    c=`<div class="mt">Account details — ${st.name||''} <button class="xbtn" onclick="closeModal()">×</button></div>
    <div class="tm" style="margin-bottom:10px">${st.section||''} · ${st.designation||''}</div>
    ${has?`<div style="font-size:12px">
      ${row('<i class="ti ti-building-bank"></i> Bank Name', st.bank_name)}
      ${row('<i class="ti ti-user"></i> Account Title', st.account_title)}
      ${row('<i class="ti ti-credit-card"></i> Account No / IBAN', st.account_no)}
    </div>`:'<div class="alert ai" style="font-size:11px"><i class="ti ti-info-circle"></i> No bank account details on file. Add them via Staff Records → Edit.</div>'}`;
  }

  // Director (or approver) views a disapproval / conditional remark.
  if(type==='view_remark'){
    const st=DB.staff_users.find(x=>x.id===data)||Object.values(DB.monthly_additions||{}).reduce((a,b)=>a.concat(b),[]).find(x=>x.id===data)||{};
    const mo=APP.month;
    const rec=(DB.staff_approvals[mo]||{})[data];
    let items=[];
    if(rec && rec.status!==undefined){ if(rec.remarks) items.push({label:'Approver', d:rec}); }
    else { items=coveringSlots(data).map(slot=>{const d=staffApprovalBy(mo,data,slot.key);return d&&d.remarks?{label:slot.label,d}:null;}).filter(Boolean); }
    c=`<div class="mt">Remarks — ${st.name||''} <button class="xbtn" onclick="closeModal()">×</button></div>
    ${items.length?items.map(({label,d})=>{const meta=apprMeta(d.status);return `<div class="alert ${d.status==='disapproved'?'aw':(d.status==='conditional'?'':'ai')}" ${d.status==='conditional'?'style="background:#d9770622;border:1px solid #d9770644;color:#fbbf24"':''}><i class="ti ti-message-2"></i> <span><b>${label}:</b> ${d.remarks.replace(/</g,'&lt;')}<br><span class="tm">${meta.label} by ${d.by||'—'} on ${d.date||'—'}</span></span></div>`;}).join(''):'<div class="alert ai"><i class="ti ti-message-2"></i> No remark provided.</div>'}`;
  }

  // Director: full deduction breakdown for one staff member.
  if(type==='slip_detail'){
    const [sid,mo]=String(data).split('|');
    const sl=calcSlip(sid,mo);
    if(sl){
      const row=(lbl,val,sub,color)=>`<tr><td style="padding:7px 10px;color:var(--text2)">${lbl}${sub?`<span class="tm"> ${sub}</span>`:''}</td><td style="padding:7px 10px;text-align:right;font-weight:600;color:${color||(/^-/.test(val)?'#f87171':'var(--text)')}">${val}</td></tr>`;
      c=`<div class="mt">Salary details — ${sl.name} <button class="xbtn" onclick="closeModal()">×</button></div>
      <div class="tm" style="margin-bottom:10px">${sl.section} · ${sl.designation} · ${mo}</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        ${row('Basic salary','Rs'+sl.salary.toLocaleString())}
        ${sl.ces&&sl.ces.length?sl.ces.map(ce=>row(ce.label,'+Rs'+ce.amount.toLocaleString(),ce.global?'(all)':'','#34d399')).join(''):''}
        ${sl.ceTotal>0?row('Total Earnings','+Rs'+sl.ceTotal.toLocaleString(),'','#34d399'):''}
        ${row('Day Late','-Rs'+Math.round(sl.lateDays*sl.ppd).toLocaleString(),`(${sl.tLate} lates − 2 allowed = ${sl.effectiveLates} late)`)}
        ${row('Half Leave','-Rs'+Math.round(sl.hlDays*sl.ppd).toLocaleString(),`(${sl.hlRaw} half leave)`)}
        ${row('Day Leave','-Rs'+Math.round(sl.dleaDays*sl.ppd).toLocaleString(),`(${sl.absent} absent + ${sl.casualLeave} casual leave)`)}
        ${row('Security','-Rs'+sl.secDed.toLocaleString(),sl.secDed>0?`(${sl.secPct}%${sl.secCompleted?' · completed':''})`:(sl.secCompleted?'(completed)':''))}
        ${sl.cds&&sl.cds.length?sl.cds.map(cd=>row(cd.label,'-Rs'+cd.amount.toLocaleString(),cd.global?'(all)':'')).join(''):''}
        <tr style="border-top:1px solid #1e293b"><td style="padding:9px 10px;font-weight:700;color:var(--text)">Total Deduction</td><td style="padding:9px 10px;text-align:right;font-weight:700;color:#f87171">-Rs${sl.deduction.toLocaleString()}</td></tr>
        <tr style="background:var(--inset)"><td style="padding:9px 10px;font-weight:700;color:var(--text)">Net Pay</td><td style="padding:9px 10px;text-align:right;font-weight:700;color:#34d399">Rs${sl.net.toLocaleString()}</td></tr>
      </table>`;
    }
  }

  return `<div class="modal-ov" onclick="if(event.target===this)closeModal()"><div class="modal">${c}</div></div>`;
}

// ─── SESSION PERSISTENCE (survives browser refresh) ───────────
const SESSION_KEY='pdcs5_session';
// Reads the "Remember me" checkbox on the login screen (default on).
function rememberMe(){ const el=document.getElementById('remember_me'); return el?!!el.checked:true; }
// remember=true → persist in localStorage (survives closing the browser).
// remember=false → sessionStorage only (cleared when the browser/tab closes).
function saveSession(user, remember){
  try{
    localStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_KEY);
    if(!user) return;
    (remember?localStorage:sessionStorage).setItem(SESSION_KEY, user.id);
  }catch(e){}
}
function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_KEY); }catch(e){} }
// Re-resolve the saved user against current data (so role/details stay fresh).
function restoreSession(){
  let id; try{ id=localStorage.getItem(SESSION_KEY)||sessionStorage.getItem(SESSION_KEY); }catch(e){}
  if(!id) return;
  const found=SYSTEM_USERS.find(x=>x.id===id)||DB.staff_users.find(x=>x.id===id);
  if(found){
    APP.user=found;
    APP.tab=found.role==='staff'?'my_home':'dashboard';
    applyStaffDefaultMonth(found);
  } else {
    clearSession();
  }
}
function signIn(found){
  APP.user=found;
  APP.tab=found.role==='staff'?'my_home':'dashboard';
  applyStaffDefaultMonth(found);
  saveSession(found, rememberMe());
  R();
}

function toggleTheme(){

// ─── TOAST + CONFIRM (styled replacements for native alert/confirm) ──────
function escHtml(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Convert a plain message (with \n) to safe HTML with line breaks.
function msgToHtml(s){return escHtml(s).replace(/\n/g,'<br>');}
// toast(message, type) — type: 'info'|'success'|'error'|'warn'. Lives on <body> so it survives re-renders.
function toast(message, type){
  type=type||'info';
  let wrap=document.getElementById('toast-wrap');
  if(!wrap){ wrap=document.createElement('div'); wrap.id='toast-wrap'; document.body.appendChild(wrap); }
  const icons={info:'ti-info-circle',success:'ti-circle-check',error:'ti-alert-circle',warn:'ti-alert-triangle'};
  const el=document.createElement('div');
  el.className='toast '+type;
  el.innerHTML=`<i class="ti ${icons[type]||icons.info}"></i><div class="tx">${msgToHtml(message)}</div><button class="tclose">&times;</button>`;
  const remove=()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),250); };
  el.querySelector('.tclose').onclick=remove;
  wrap.appendChild(el);
  setTimeout(remove, type==='error'?6000:4000);
}
// confirmDialog(opts) → Promise<boolean>. opts: string | {title,message,okLabel,cancelLabel,danger,icon}
let CONFIRM_CTX=null, _confirmResolve=null, _confirmPrevModal=null;
function confirmDialog(opts){
  const o=(typeof opts==='string')?{message:opts}:(opts||{});
  CONFIRM_CTX={
    title:o.title||'Please confirm',
    message:o.message||'',
    okLabel:o.okLabel||'Confirm',
    cancelLabel:o.cancelLabel||'Cancel',
    danger:o.danger!==false,           // default to danger styling
    icon:o.icon||(o.danger===false?'ti-help-circle':'ti-alert-triangle'),
  };
  _confirmPrevModal=APP.modal||null;   // restore any modal that was open underneath
  APP.modal={type:'app_confirm'};
  R();
  return new Promise(res=>{ _confirmResolve=res; });
}
function _confirmDone(val){
  const r=_confirmResolve; _confirmResolve=null;
  const prev=_confirmPrevModal; _confirmPrevModal=null; CONFIRM_CTX=null;
  APP.modal=prev; R();
  if(r) r(val);
}
function toggleSidebar(e){e.stopPropagation();const sb=document.getElementById('sb');sb&&sb.classList.toggle('open');}
function closeSidebar(){const sb=document.getElementById('sb');sb&&sb.classList.remove('open');}

async function addAdmin(){
  const name=(document.getElementById('m_name').value||'').trim();
  const user=(document.getElementById('m_user').value||'').trim();
  const pass=(document.getElementById('m_pass').value||'').trim();
  const err=document.getElementById('m_err');
  if(!name||!user||!pass){err.style.display='block';err.textContent='All fields required';return;}
  if(getAllUsers().find(u=>u.username===user)){err.style.display='block';err.textContent='Username taken';return;}
  DB.staff_users.push({id:'admin_'+Date.now(),username:user,password:pass,role:'admin',name,privileges:readPrivs()});
  await saveField('staff_users');closeModal();
}

async function saveAdmin(id){
  const idx=DB.staff_users.findIndex(s=>s.id===id);
  if(idx<0) return;
  const a=DB.staff_users[idx];
  a.name=(document.getElementById('ea_name').value||'').trim()||a.name;
  a.password=(document.getElementById('ea_pass').value||'').trim()||a.password;
  if(!isSuperAdmin(a)) a.privileges=readPrivs(); // super-admin keeps full access
  await saveField('staff_users');closeModal();
}

// Grant/update admin privileges on an existing STAFF member (a "staff-admin").
async function saveStaffPrivs(id){
  const st=DB.staff_users.find(s=>s.id===id); if(!st||st.role!=='staff') return;
  st.privileges=readPrivs(GRANTABLE_PRIVS);
  await saveField('staff_users');closeModal();
  toast(Object.keys(st.privileges).length?(st.name+' granted admin access.'):(st.name+'’s admin access removed.'),'success');
}
async function revokeStaffPrivs(id){
  const st=DB.staff_users.find(s=>s.id===id); if(!st) return;
  if(!await confirmDialog('Remove all admin privileges from '+st.name+'?')) return;
  delete st.privileges;
  await saveField('staff_users');closeModal();
  toast(st.name+'’s admin access removed.','info');
}

async function submitChangePassword(){
  const u=APP.user; if(!u) return;
  const cur=document.getElementById('cp_cur').value||'';
  const nw=document.getElementById('cp_new').value||'';
  const conf=document.getElementById('cp_conf').value||'';
  const err=document.getElementById('cp_err');
  const fail=m=>{ if(err){ err.style.display='block'; err.textContent=m; } };
  if(effPw(u)!==cur) return fail('Current password is incorrect.');
  if(nw.length<4) return fail('New password must be at least 4 characters.');
  if(nw!==conf) return fail('New passwords do not match.');
  await setUserPassword(u.id, nw);
  closeModal();
  toast('Your password has been updated.','success');
}
async function submitRecovery(){
  const uname=(document.getElementById('rp_user').value||'').trim();
  const code=document.getElementById('rp_code').value||'';
  const nw=document.getElementById('rp_new').value||'';
  const conf=document.getElementById('rp_conf').value||'';
  const err=document.getElementById('rp_err');
  const fail=m=>{ if(err){ err.style.display='block'; err.textContent=m; } };
  if(code!==recoveryCode()) return fail('Incorrect master recovery code.');
  const target=findUserByName(uname);
  if(!target) return fail('No account found with that username.');
  if(nw.length<4) return fail('New password must be at least 4 characters.');
  if(nw!==conf) return fail('Passwords do not match.');
  await setUserPassword(target.id, nw);
  closeModal();
  toast('Password for "'+uname+'" has been reset. You can sign in now.','success');
}
async function setRecoveryCode(){
  const v=(document.getElementById('set_recovery_code').value||'').trim();
  if(v.length<4){ toast('Recovery code must be at least 4 characters.','error'); return; }
  if(!DB.settings) DB.settings={};
  DB.settings.recovery_code=v;
  await saveField('settings');
  toast('Master recovery code updated.','success');
}

async function editStaff(id){
  const idx=DB.staff_users.findIndex(s=>s.id===id);
  if(idx<0) return;
  const user=(document.getElementById('m_user').value||'').trim();
  if(getAllUsers().find(u=>u.username===user&&u.id!==id)){toast('That username is already taken.','error');return;}
  const quota_mode=document.getElementById('m_quota_mode').value;
  const st=DB.staff_users[idx];
  Object.assign(st,{
    name:(document.getElementById('m_name').value||'').trim(),
    username:user,
    password:(document.getElementById('m_pass').value||'').trim(),
    section:document.getElementById('m_sec').value,
    designation:(document.getElementById('m_desig').value||'').trim(),
    security_pct:Math.max(0,Math.min(100,parseFloat(document.getElementById('m_sec2').value)||0)),
    // Active with a monthly % OR a fixed prepaid amount (% = 0).
    security:(parseFloat(document.getElementById('m_sec2').value)>0)||(parseInt(document.getElementById('m_sec_paid').value)>0),
    security_paid:Math.max(0,parseInt(document.getElementById('m_sec_paid').value)||0),
    security_docs:!!document.getElementById('m_sec_docs').checked, // documents submitted instead of cash security

    join_date:document.getElementById('m_join_full').value||'',
    join_month:(document.getElementById('m_join_full').value||'').slice(0,7),
    quota_mode,
    annual_quota:quota_mode==='manual'?(parseInt(document.getElementById('m_ann_q').value)||12):null,
    sick_quota:quota_mode==='manual'?(parseInt(document.getElementById('m_sick_q').value)||6):null,
    bank_name:(document.getElementById('m_bank').value||'').trim(),
    account_title:(document.getElementById('m_acc_title').value||'').trim(),
    account_no:(document.getElementById('m_acc_no').value||'').trim(),
  });

  // ── Effective-dated salary ──
  // Capture the existing salary as history baseline BEFORE applying the change,
  // so months before the effective date keep the old amount.
  ensureSalaryHistory(st);
  const newSal=parseInt(document.getElementById('m_sal').value)||0;
  const nowMonth=new Date().toISOString().slice(0,7);
  const effFrom=(document.getElementById('m_sal_from').value||nowMonth);
  // Only record a change if the new salary differs from what already applies that month.
  if(newSal!==salaryForMonth(st, effFrom)){
    st.salary_history=st.salary_history.filter(h=>h.from!==effFrom);
    st.salary_history.push({from:effFrom, salary:newSal});
    st.salary_history.sort((a,b)=> a.from<b.from?-1:(a.from>b.from?1:0));
  }
  // Mirror the salary IN EFFECT NOW onto st.salary (used for display in Staff
  // Records + the security 1× cap). Using salaryForMonth(now) — not the
  // latest-dated history entry — means editing a salary for an older effective
  // month no longer fails to update the displayed current salary, and a
  // future-dated raise won't show as "current" until its month arrives.
  st.salary=salaryForMonth(st, nowMonth);

  await saveField('staff_users');closeModal();
}

// ─── REUSABLE TABLE SEARCH ────────────────────────────────────
// searchBox(targetClass): renders an input that live-filters rows carrying
//   class=targetClass and a data-search="..." attribute (no re-render → keeps focus).
function searchBox(targetClass, placeholder){
  return `<div style="position:relative;margin-bottom:12px;max-width:320px">
    <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px"></i>
    <input class="inp" data-target="${targetClass}" placeholder="${placeholder||'Search by name…'}" oninput="tblFilter(this)" style="padding-left:30px">
  </div>`;
}
function tblFilter(input){
  const q=input.value.toLowerCase().trim();
  const cls=input.dataset.target;
  const rows=document.querySelectorAll('.'+cls);
  rows.forEach(el=>{
    el.style.display=(!q||(el.dataset.search||'').includes(q))?'':'none';
  });
  // Hide section-group headers that have no visible rows under them.
  const tbl=rows.length?rows[0].closest('table'):null;
  if(!tbl) return;
  tbl.querySelectorAll('.sec-hdr-row').forEach(hdr=>{
    let anyVisible=false, n=hdr.nextElementSibling;
    while(n && !n.classList.contains('sec-hdr-row')){
      if(n.classList.contains(cls) && n.style.display!=='none'){ anyVisible=true; break; }
      n=n.nextElementSibling;
    }
    hdr.style.display=(!q||anyVisible)?'':'none';
  });
}
// escape a value for safe use inside a data-search="" attribute
function ds(v){ return String(v||'').toLowerCase().replace(/"/g,''); }

// Section-grouping header row — colour-coded per section, clearly visible on dark.

// Upload a portal logo — resized down so it stays small enough to sync.
function uploadLogo(input){
  const file=input.files&&input.files[0]; if(!file) return;
  if(!file.type.startsWith('image/')){ toast('Please choose an image file.','error'); input.value=''; return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=async()=>{
      const maxW=320, maxH=110;
      const scale=Math.min(1, maxW/img.width, maxH/img.height);
      const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let url;
      try{ url=cv.toDataURL('image/png'); }catch(e){ toast('Could not process that image.','error'); return; }
      if(url.length>180000) url=cv.toDataURL('image/jpeg',0.85); // fall back to smaller jpeg
      if(!DB.settings) DB.settings={};
      DB.settings.portal_logo=url;
      await saveField('settings'); cacheBranding();
      toast('Logo updated.','success'); R();
    };
    img.onerror=()=>toast('That image could not be read.','error');
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

// Release flow with the override safeguard: if all approvers approved → simple confirm;
// otherwise warn and let the Director override the missing approvals, then release.
async function releaseWithCheck(m){
  const ap=apStatus(m);
  if(ap.full){
    if(!await confirmDialog('Release salary for all staff for '+m+'?')) return;
  } else {
    const missing=APPROVER_LIST.filter(a=>!(DB.approvals[m]||{})[a.key]).map(a=>a.label).join(', ');
    if(!await confirmDialog('⚠ Not all approvers have approved '+m+'.\n\nStill pending: '+missing+'\n\nDo you want to OVERRIDE them all and release the salary now?')) return;
    if(!DB.approvals[m]) DB.approvals[m]={};
    const stamp=new Date().toLocaleDateString()+' (Override)';
    APPROVER_LIST.forEach(a=>{ if(!DB.approvals[m][a.key]) DB.approvals[m][a.key]=stamp; });
    await saveField('approvals');
  }
  if(!DB.releases[m]) DB.releases[m]={};
  DB.releases[m].released=true;
  DB.releases[m].date=new Date().toLocaleDateString();
  await saveField('releases');R();
}

async function markStaff(m,sid,status,remarks){
  if(staffReleased(m,sid)){ toast('Salary already released by the Director — the decision is locked.','warn'); closeModal(); return; }
  const keys=actingApproverKeys(APP.user.id, sid);
  if(!keys.length){ toast('You are not an approver for this staff member.','error'); closeModal(); return; }
  if(!DB.staff_approvals[m]) DB.staff_approvals[m]={};
  let rec=DB.staff_approvals[m][sid];
  if(!rec || rec.status!==undefined) rec=DB.staff_approvals[m][sid]={}; // init / migrate legacy flat
  const date=new Date().toLocaleDateString();
  keys.forEach(k=>{

// ─── PER-STAFF RELEASE ACTIONS ────────────────────────────────
async function releaseStaff(m,sid){
  const isAdmin=APP.user.role==='admin';
  // Admins may only release salaries the Director delegated to them.
  if(isAdmin && !((DB.release_delegations[m]||{})[sid])){
    toast('This salary has not been delegated to you by the Director.','error');return;
  }
  const a=staffApproval(m,sid);
  if(a&&a.status==='disapproved'){
    if(!await confirmDialog('This staff member was DISAPPROVED by the approver:\n\n"'+(a.remarks||'')+'"\n\nRelease their salary anyway?')) return;
  } else if(a&&a.status==='conditional'){
    if(!await confirmDialog('Conditional approval from '+(a.by||'approver')+':\n\n"'+(a.remarks||'')+'"\n\nRelease the salary now?')) return;
  }
  if(!DB.staff_releases[m]) DB.staff_releases[m]={};
  const slR=calcSlip(sid,m);
  const amt=slR?slR.net:0;
  const who=isAdmin?'Admin':'Director';
  const date=new Date().toLocaleDateString();
  DB.staff_releases[m][sid]={date, amount:amt, parts:[{by:who, amount:amt, date}]};
  if(!DB.release_by[m]) DB.release_by[m]={};
  DB.release_by[m][sid]=who;
  // delegation fulfilled — clear it
  if(DB.release_delegations[m]) delete DB.release_delegations[m][sid];
  await saveField('staff_releases');await saveField('release_by');await saveField('release_delegations');R();
}
async function unreleaseStaff(m,sid){
  // Roll back only the most recent segment so an earlier release (e.g. a base amount)
  // isn't wiped by undoing a later top-up. One segment ⇒ full unrelease.
  const remaining=releaseParts(m,sid).slice(0,-1);
  if(remaining.length){
    const total=remaining.reduce((a,p)=>a+(p.amount||0),0);
    const prev=releaseRec(m,sid)||{};
    DB.staff_releases[m][sid]={date:prev.date||'', amount:total, parts:remaining};
    if(!DB.release_by[m]) DB.release_by[m]={};
    DB.release_by[m][sid]=remaining[remaining.length-1].by;
  } else {
    if(DB.staff_releases[m]) delete DB.staff_releases[m][sid];
    if(DB.release_by[m]) delete DB.release_by[m][sid];
  }
  // Undoing the release invalidates any signed receipt for this person.
  if(DB.receipts[m]) delete DB.receipts[m][sid];
  removeSigImage(m,sid);
  await saveField('staff_releases');await saveField('release_by');await saveField('receipts');R();
}
// Admin undoes a release they made on a delegated salary. Reverses the release
// and restores the delegation so the row returns to the pending list.
async function undoReleaseAdmin(m,sid){
  if(!await confirmDialog('Undo this salary release? It will move back to your pending list.')) return;
  // Only reverse the Admin's own (most recent) segment. Any earlier segment — e.g. a
  // base amount the Director already released — stays paid; just the Admin's portion
  // is rolled back and re-delegated so it can be released again.
  const remaining=releaseParts(m,sid).slice(0,-1);
  if(!DB.release_delegations[m]) DB.release_delegations[m]={};
  DB.release_delegations[m][sid]=true; // delegation still belongs to the admin
  if(remaining.length){
    const total=remaining.reduce((a,p)=>a+(p.amount||0),0);
    const prev=releaseRec(m,sid)||{};
    DB.staff_releases[m][sid]={date:prev.date||'', amount:total, parts:remaining};
    if(!DB.release_by[m]) DB.release_by[m]={};
    DB.release_by[m][sid]=remaining[remaining.length-1].by; // reverts to the prior releaser
  } else {
    if(DB.staff_releases[m]) delete DB.staff_releases[m][sid];
    if(DB.release_by[m]) delete DB.release_by[m][sid];
  }
  // The signed receipt covered the full released total — invalidate it after a rollback.
  if(DB.receipts[m]) delete DB.receipts[m][sid];
  removeSigImage(m,sid);
  await saveField('staff_releases');await saveField('release_by');await saveField('receipts');await saveField('release_delegations');R();
}

// Salary rose after release — release the outstanding difference. The stored

async function releaseTopUp(m,sid){
  const isAdmin=APP.user.role==='admin';
  // Admins may only release the remaining if the Director delegated it to them.
  if(isAdmin && !((DB.release_delegations[m]||{})[sid])){

  }

    okLabel:'Release Rs'+rem.toLocaleString(), danger:false})) return;

  const date=new Date().toLocaleDateString();
  // Keep each earlier segment intact and add this top-up as its own segment so the
  // breakdown of who paid what (and a later undo) stays correct.

// ─── DRAWN SIGNATURE RECEIPT ───────────────────────────────────
// Teacher draws a signature on a canvas instead of a single click, giving real
// proof of receipt that can't be denied. Stored as a PNG data URL on the receipt.
const SIGPAD={drawing:false,last:null,empty:true};
function openSignPad(sid,m){
  if(APP.user.role!=='staff'||APP.user.id!==sid){
    toast('Only the staff member can sign their own receipt.','error');return;
  }
  if(!staffReleased(m,sid)){toast('Your salary has not been released yet.','warn');return;}
  APP.modal={type:'sign_pad',data:sid+'|'+m};R();
  requestAnimationFrame(sigInitPad); // canvas exists only after the re-render
}
function sigInitPad(){
  const c=document.getElementById('sigpad');if(!c) return;
  const r=c.getBoundingClientRect();
  c.width=Math.max(1,Math.round(r.width)); c.height=180; // match displayed size for crisp strokes
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  SIGPAD.drawing=false;SIGPAD.last=null;SIGPAD.empty=true;
}
function sigPos(e){
  const c=document.getElementById('sigpad');const r=c.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(c.width/r.width), y:(e.clientY-r.top)*(c.height/r.height)};
}
function sigStart(e){
  e.preventDefault();const c=document.getElementById('sigpad');if(!c) return;
  SIGPAD.drawing=true;SIGPAD.last=sigPos(e);
  try{c.setPointerCapture(e.pointerId);}catch(_){}
}
function sigMove(e){
  if(!SIGPAD.drawing) return;e.preventDefault();
  const c=document.getElementById('sigpad');const ctx=c.getContext('2d');const p=sigPos(e);
  ctx.strokeStyle='#0f172a';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(SIGPAD.last.x,SIGPAD.last.y);ctx.lineTo(p.x,p.y);ctx.stroke();
  SIGPAD.last=p;SIGPAD.empty=false;
}
function sigEnd(){SIGPAD.drawing=false;}
function sigClear(){
  const c=document.getElementById('sigpad');if(!c) return;
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  SIGPAD.empty=true;SIGPAD.last=null;
}
// Trim whitespace and downscale so each stored signature is only a few KB.
function compressSig(canvas){
  const w=canvas.width,h=canvas.height;
  const px=canvas.getContext('2d').getImageData(0,0,w,h).data;
  let minX=w,minY=h,maxX=0,maxY=0,found=false;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4;
    if(px[i]<240||px[i+1]<240||px[i+2]<240){ // ink pixel (not white)
      found=true;
      if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
    }
  }
  if(!found){minX=0;minY=0;maxX=w;maxY=h;}
  const pad=10;
  minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
  maxX=Math.min(w,maxX+pad);maxY=Math.min(h,maxY+pad);
  const cw=Math.max(1,maxX-minX),ch=Math.max(1,maxY-minY);
  const scale=Math.min(1,320/cw); // cap width at 320px
  const out=document.createElement('canvas');
  out.width=Math.max(1,Math.round(cw*scale));out.height=Math.max(1,Math.round(ch*scale));
  const o=out.getContext('2d');
  o.fillStyle='#fff';o.fillRect(0,0,out.width,out.height);
  o.drawImage(canvas,minX,minY,cw,ch,0,0,out.width,out.height);
  return out.toDataURL('image/png');
}
// Signature images live OUTSIDE the realtime-synced `receipts` node so they are
// never bulk-downloaded on every change — fetched only when actually viewed.
function sigPath(m,sid){return FB_ROOT+'/receipt_sigs/'+m+'/'+sid;}
async function fetchSigImage(m,sid){try{return (await FDB.ref(sigPath(m,sid)).once('value')).val();}catch(_){return null;}}
function removeSigImage(m,sid){try{FDB.ref(sigPath(m,sid)).remove();}catch(_){}}
async function saveSignature(){
  const [sid,m]=(APP.modal.data||'').split('|');
  if(APP.user.role!=='staff'||APP.user.id!==sid){
    toast('Only the staff member can sign their own receipt.','error');return;
  }
  if(!staffReleased(m,sid)){toast('Your salary has not been released yet.','warn');return;}
  if(SIGPAD.empty){toast('Please draw your signature before submitting.','warn');return;}
  const c=document.getElementById('sigpad');if(!c) return;
  const sig=compressSig(c);
  // Heavy image → separate, non-synced path. Lightweight flag → realtime receipts.
  await FDB.ref(sigPath(m,sid)).set(sig);
  if(!DB.receipts[m]) DB.receipts[m]={};
  DB.receipts[m][sid]={date:new Date().toLocaleDateString(), by:APP.user.username||sid, sig:true};
  await saveField('receipts');closeModal();
}

// New salary after an increment: percentage (% of base) or fixed amount added.
function incNewSalary(base, type, val){
  base=base||0; val=val||0;
  return type==='amt' ? Math.round(base+val) : Math.round(base*(1+val/100));
}
// Live preview inside the Apply-Increment modal.
function incPreview(id){
  const st=DB.staff_users.find(s=>s.id===id); if(!st) return;
  const typeEl=document.getElementById('inc_type'), valEl=document.getElementById('inc_val'),
        fromEl=document.getElementById('inc_from'), out=document.getElementById('inc_preview');
  if(!out) return;
  const type=typeEl?typeEl.value:'pct';
  const val=parseFloat(valEl&&valEl.value)||0;
  const effFrom=(fromEl&&fromEl.value)||new Date().toISOString().slice(0,7);
  const base=salaryForMonth(st, effFrom)||st.salary||0;
  const nw=incNewSalary(base, type, val);
  out.innerHTML=val>0
    ? `New basic salary: <b style="color:#34d399">Rs${nw.toLocaleString()}</b> <span class="tm" style="font-size:11px">(${type==='pct'?('+'+val+'% on Rs'+base.toLocaleString()):('+Rs'+val.toLocaleString())} ⇒ +Rs${(nw-base).toLocaleString()})</span>`
    : `New basic salary: <b style="color:#34d399">Rs${base.toLocaleString()}</b> <span class="tm" style="font-size:11px">(enter a value above)</span>`;
}
// Apply an increment: raises the salary using the effective-dated history (past
// months untouched), clears the "Due Now" reminder, and records the change so the
// Director can see the staff member's salary was incremented.
async function submitIncrement(id){
  const st=DB.staff_users.find(s=>s.id===id); if(!st) return;
  const type=document.getElementById('inc_type').value;
  const val=parseFloat(document.getElementById('inc_val').value)||0;
  if(!(val>0)){ toast('Enter an increment value greater than 0.','error'); return; }
  const effFrom=document.getElementById('inc_from').value||new Date().toISOString().slice(0,7);
  // Capture the currently-due increment month BEFORE marking applied, so the reminder rolls forward.
  const dueBefore=getNextIncrementDate(st);
  const dueMonth=dueBefore?(dueBefore.getFullYear()+'-'+String(dueBefore.getMonth()+1).padStart(2,'0')):effFrom;
  ensureSalaryHistory(st);
  const base=salaryForMonth(st, effFrom)||st.salary||0;
  const newSal=incNewSalary(base, type, val);
  // Remember any pre-existing history entry at this month so the increment can be cleanly undone.
  const replaced=st.salary_history.find(h=>h.from===effFrom);
  const replacedCopy=replaced?{from:replaced.from, salary:replaced.salary}:null;
  // Effective-dated salary change — earlier months keep their old salary.
  if(newSal!==salaryForMonth(st, effFrom)){
    st.salary_history=st.salary_history.filter(h=>h.from!==effFrom);
    st.salary_history.push({from:effFrom, salary:newSal});
    st.salary_history.sort((a,b)=> a.from<b.from?-1:(a.from>b.from?1:0));
  }
  // Mirror the salary in effect now onto st.salary (Staff Records + security cap).
  st.salary=salaryForMonth(st, new Date().toISOString().slice(0,7));
  // Clear the reminder (roll to next year) and record the increment for the Director's status.
  st.increment_applied_until=dueMonth;
  st.last_increment={month:effFrom, type, value:val, from:base, to:newSal, date:new Date().toLocaleDateString(), by:(APP.user.username||APP.user.role||'admin'), replaced:replacedCopy};
  await saveField('staff_users');
  closeModal();
  toast(st.name+'’s salary incremented to Rs'+newSal.toLocaleString()+' (effective '+fmtMonthLabel(effFrom)+').','success');
}
// Undo the most recent increment: reverts the salary raise, re-shows the reminder.
async function undoIncrementApplied(id){
  const st=DB.staff_users.find(s=>s.id===id); if(!st) return;
  const li=st.last_increment;
  if(!await confirmDialog(li?('Undo the increment for '+st.name+' (back to Rs'+(li.from||0).toLocaleString()+' from '+fmtMonthLabel(li.month)+')? The "Due Now" reminder will return.'):'Undo the last applied increment for '+st.name+'?')) return;
  if(li){
    ensureSalaryHistory(st);
    // Remove the increment entry we added, then restore whatever was there before (if anything).
    st.salary_history=st.salary_history.filter(h=>!(h.from===li.month && h.salary===li.to));
    if(li.replaced) st.salary_history.push({from:li.replaced.from, salary:li.replaced.salary});
    st.salary_history.sort((a,b)=> a.from<b.from?-1:(a.from>b.from?1:0));
    st.salary=salaryForMonth(st, new Date().toISOString().slice(0,7));
    delete st.last_increment;
  }
  delete st.increment_applied_until;
  await saveField('staff_users');
  if(APP.modal&&APP.modal.type==='set_incr') closeModal(); else R();
  toast('Increment undone for '+st.name+'.','info');
}

</script>
