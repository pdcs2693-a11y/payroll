<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDC&S Staff Portal v5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* ─── THEME PALETTE ─── default = dark; body.light flips to a light scheme ─── */
:root{
  --bg:#0f1117; --surface:#1e2433; --surface2:#111827; --sidebar:#161b28;
  --inset:#0f1117; --border:#2d3450; --border-soft:#1a1f2e;
  --text:#e2e8f0; --text-soft:#cbd5e1; --text2:#94a3b8; --text3:#64748b; --text4:#475569;
}
body.light{
  --bg:#e7ecf3; --surface:#ffffff; --surface2:#eef2f8; --sidebar:#ffffff;
  --inset:#e2e8f0; --border:#cbd5e1; --border-soft:#dde4ee;
  --text:#0f172a; --text-soft:#1e293b; --text2:#475569; --text3:#64748b; --text4:#94a3b8;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
/* ── Boot / loading splash ── */
#boot-loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);transition:opacity .5s ease,visibility .5s ease}
#boot-loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.bl-badge{position:relative;display:flex;align-items:center;justify-content:center;width:80px;height:80px}
.bl-ring{position:absolute;inset:0;border-radius:50%;border:4px solid var(--border-soft);border-top:4px solid #3b82f6;animation:blspin 0.8s linear infinite}
.bl-ico{font-size:30px;color:#3b82f6}
.bl-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:.3px;text-align:center}
.bl-sub{font-size:12px;color:var(--text3);margin-top:4px;text-align:center}
@keyframes blspin{to{transform:rotate(360deg)}}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:440px;max-width:100%}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{font-size:18px;font-weight:700;color:#60a5fa}
.auth-logo p{font-size:11px;color:var(--text3);margin-top:3px}
.flbl{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
.finp{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px}
.finp:focus{border-color:#3b82f6}
.btn-login{width:100%;padding:11px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-login:hover{background:#2563eb}
.err{color:#f87171;font-size:12px;margin-bottom:10px;padding:8px 12px;background:#dc262615;border-radius:6px;display:none}
.ql-section{margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
.ql-section p{font-size:11px;color:var(--text4);margin-bottom:8px;text-align:center}
.ql-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.qbtn{padding:7px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:10px;cursor:pointer;text-align:left;width:100%}
.qbtn:hover{border-color:#3b82f6;color:var(--text)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bd{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.ba{background:#05966922;color:#34d399;border:1px solid #05966944}
.bs{background:#1d4ed822;color:#60a5fa;border:1px solid #1d4ed844}
.bc{background:#d9770622;color:#fb923c;border:1px solid #d9770644}
.bx{background:#37415122;color:#9ca3af;border:1px solid #4b556344}
.bg{background:#05966922;color:#34d399;border:1px solid #05966944}
.by{background:#d9770622;color:#fb923c;border:1px solid #d9770644}
.br{background:#dc262622;color:#f87171;border:1px solid #dc262644}
/* Layout */
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.brand{font-size:14px;font-weight:700;color:#60a5fa}
.nav-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.nu{font-size:11px;color:var(--text2)}
.nu b{color:var(--text)}
.logout-btn{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:11px;cursor:pointer;white-space:nowrap}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:210px;background:var(--sidebar);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0}
.sb-sec{font-size:10px;color:var(--text4);padding:10px 16px 4px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--text3);font-size:12px;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sb-item:hover{background:var(--surface);color:var(--text)}
.sb-item.active{background:var(--surface);color:#60a5fa;border-left-color:#3b82f6}
.sb-item i{font-size:16px}
.content{flex:1;padding:20px;overflow-y:auto;min-width:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.ct{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.ct>*{min-width:0}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,165px),1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px}
.stat[onclick],.card[onclick]{transition:border-color .15s,transform .15s}
.stat[onclick]:hover,.card[onclick]:hover{border-color:#3b82f6;transform:translateY(-2px)}
.stat-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sv{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.sl{font-size:11px;color:var(--text2);margin-top:5px;font-weight:600;letter-spacing:.2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--inset)}
.inp{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none}
.inp:focus{border-color:#3b82f6}
.inp-sm{width:55px;padding:4px 5px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;outline:none}
.inp-sm:focus{border-color:#3b82f6}
select.inp option{background:var(--surface2)}
.lbl{display:block;font-size:11px;color:var(--text3);margin-bottom:4px}
.fsep{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bsm{padding:5px 10px;font-size:11px}
.bb{background:#3b82f6;color:#fff}.bb:hover{background:#2563eb}
.bgr{background:#059669;color:#fff}.bgr:hover{background:#047857}
.brd{background:#dc2626;color:#fff}.brd:hover{background:#b91c1c}
.bou{background:transparent;border:1px solid var(--border);color:var(--text2)}.bou:hover{border-color:#3b82f6;color:#60a5fa}
.bpu{background:#7c3aed;color:#fff}.bpu:hover{background:#6d28d9}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,170px),1fr));gap:10px;margin-bottom:10px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.ai{background:#1d4ed822;border:1px solid #1d4ed844;color:#60a5fa}
.as{background:#05966922;border:1px solid #05966944;color:#34d399}
.aw{background:#d9770622;border:1px solid #d9770644;color:#fb923c}
/* Modal — mobile-friendly */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
@media(min-width:600px){.modal-ov{align-items:center;padding:16px}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:14px}}
.mt{font-size:15px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.xbtn{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.xbtn:hover{color:var(--text)}
.div{height:1px;background:var(--border);margin:12px 0}
/* Toast notifications (replace native alert) */
#toast-wrap{position:fixed;top:16px;left:0;right:0;z-index:3000;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;padding:0 12px}
.toast{pointer-events:auto;min-width:260px;max-width:440px;width:auto;background:var(--surface);border:1px solid var(--border);border-left:4px solid #60a5fa;border-radius:10px;padding:13px 16px;color:var(--text);font-size:13px;line-height:1.45;box-shadow:0 12px 34px rgba(0,0,0,.5);display:flex;align-items:flex-start;gap:11px;animation:toastIn .25s ease}
.toast.out{animation:toastOut .25s ease forwards}
.toast i{font-size:18px;flex-shrink:0;margin-top:1px}
.toast .tx{flex:1}
.toast.info{border-left-color:#60a5fa}.toast.info i{color:#60a5fa}
.toast.success{border-left-color:#34d399}.toast.success i{color:#34d399}
.toast.error{border-left-color:#f87171}.toast.error i{color:#f87171}
.toast.warn{border-left-color:#fb923c}.toast.warn i{color:#fb923c}
.toast .tclose{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
.toast .tclose:hover{color:var(--text)}
@keyframes toastIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-14px)}}
.tm{color:var(--text3);font-size:11px}
.sr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:12px}
.sr.tot{font-weight:700;font-size:14px;color:#34d399;border-bottom:none;margin-top:6px}
.dd{color:#f87171}
.steps{display:flex;align-items:center;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.sn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sn.done{background:#059669;color:#fff}
.sn.act{background:#3b82f6;color:#fff}
.sn.pend{background:var(--surface);border:1px solid var(--border);color:var(--text3)}
.sl2{font-size:10px;color:var(--text3);white-space:nowrap}
.sline{flex:1;min-width:14px;height:1px;background:var(--border);margin:0 4px}
/* salary pipeline — stage cards */
.pipe{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,150px),1fr));gap:12px}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 14px 12px;transition:border-color .2s,transform .15s}
.pipe-card:hover{transform:translateY(-2px)}
.pc-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:11px}
.pc-label{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.2px}
.pc-val{font-size:20px;font-weight:800;margin-top:5px;line-height:1.1}
.pc-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;margin-top:7px;padding:2px 8px;border-radius:20px}
.pbar{height:7px;background:var(--inset);border-radius:20px;overflow:hidden;margin:4px 0 16px}
.pbar>div{height:100%;border-radius:20px;background:linear-gradient(90deg,#3b82f6,#10b981);transition:width .5s ease}
.sec-admin{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44;display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.sec-school{background:#05966922;color:#34d399;border:1px solid #05966944;display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.sec-college{background:#1d4ed822;color:#60a5fa;border:1px solid #1d4ed844;display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.sec-domestic{background:#db277722;color:#f472b6;border:1px solid #db277744;display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.stamp{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:2px solid #059669;border-radius:8px;color:#34d399;font-size:12px;font-weight:700;margin-top:10px}
.ov-note{background:#7c3aed22;border:1px solid #7c3aed44;border-radius:8px;padding:10px 14px;font-size:11px;color:#a78bfa;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
/* approval rows — stack on mobile */
.arow{display:flex;align-items:center;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.arow-info{flex:1;min-width:120px}
.arow-action{flex-shrink:0}
/* leave quota */
.quota-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,130px),1fr));gap:10px;margin-bottom:14px}
.quota-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.quota-box.warn{border-color:#d9770644}
.quota-box.danger{border-color:#dc262644}
.qv{font-size:20px;font-weight:700}
.ql2{font-size:10px;color:var(--text3);margin-top:2px}
.dir-note{background:#dc262615;border:1px solid #dc262644;border-radius:6px;padding:8px 12px;font-size:11px;color:#f87171;margin-bottom:8px;display:flex;align-items:flex-start;gap:6px}
/* salary sheet override input */
.inp-ded{width:70px;padding:3px 5px;text-align:center;background:var(--surface2);border:1px solid #3b82f644;border-radius:5px;color:#60a5fa;font-size:11px;outline:none}
.inp-ded:focus{border-color:#3b82f6}
/* ─── custom month picker ─── */
.mpick{position:relative;display:inline-block}
.mpick-btn{display:inline-flex;align-items:center;gap:8px;width:100%;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s}
.mpick-btn:hover{border-color:#3b82f6}
.mpick.open .mpick-btn{border-color:#3b82f6;background:var(--inset)}
.mpick-btn i:first-child{color:#60a5fa;font-size:15px}
.mpick-disp{flex:1;text-align:left;white-space:nowrap}
.mpick-btn.mpick-empty .mpick-disp{color:var(--text3);font-weight:500}
.mpick-caret{margin-left:auto;color:var(--text3);font-size:13px;transition:transform .2s}
.mpick.open .mpick-caret{transform:rotate(180deg);color:#60a5fa}
.mpick-pop{position:absolute;top:calc(100% + 6px);right:0;z-index:200;width:248px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 18px 44px -12px rgba(0,0,0,.7);opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;transition:opacity .16s,transform .16s}
.mpick.open .mpick-pop{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.mpick-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mpick-yr{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.4px}
.mpick-nav{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:15px;transition:all .15s}
.mpick-nav:hover{border-color:#3b82f6;color:#60a5fa;background:var(--inset)}
.mpick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mpick-m{padding:9px 0;background:var(--surface2);border:1px solid transparent;border-radius:8px;color:var(--text-soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .14s}
.mpick-m:hover{background:var(--inset);border-color:#3b82f6;color:#60a5fa}
.mpick-m:disabled{opacity:.28;cursor:not-allowed;pointer-events:none}
.mpick-nav:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.mpick-m.sel{background:linear-gradient(180deg,#3b82f6 0%,#2563eb 100%);color:#fff;border-color:#2563eb;box-shadow:0 4px 10px -4px #2563ebaa}
.mpick-m.now{border-color:var(--border)}
/* ─── custom date picker (year + month + day) ─── */
.dpick{position:relative;display:inline-block}
.dpick-pop{position:absolute;top:calc(100% + 6px);right:0;z-index:200;width:268px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:0 18px 44px -12px rgba(0,0,0,.7);opacity:0;transform:translateY(-6px) scale(.98);pointer-events:none;transition:opacity .16s,transform .16s}
.dpick.open .dpick-pop{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.dpick-head{display:flex;align-items:center;gap:4px;margin-bottom:8px}
.dpick-lbl{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}
.dpick-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.dpick-wd span{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:3px 0}
.dpick-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dpick-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid transparent;border-radius:7px;color:var(--text-soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.dpick-d:hover{background:var(--inset);border-color:#3b82f6;color:#60a5fa}
.dpick-d.empty{background:transparent;border-color:transparent;cursor:default}
.dpick-d.sel{background:linear-gradient(180deg,#3b82f6 0%,#2563eb 100%);color:#fff;border-color:#2563eb;box-shadow:0 4px 10px -4px #2563ebaa}
.dpick-d.now{border-color:#3b82f655}
.dpick-foot{display:flex;justify-content:flex-end;margin-top:8px}
/* mobile sidebar toggle */
.mob-menu-btn{display:none;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px}
@media(max-width:700px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:90;transform:translateX(-100%);transition:transform .25s;width:240px}
  .sidebar.open{transform:translateX(0)}
  .mob-menu-btn{display:block}
  .content{padding:10px}
  .sg{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat{padding:10px;gap:10px;border-radius:10px}
  .stat-ico{width:36px;height:36px;font-size:17px;border-radius:9px}
  .sv{font-size:18px}
  .sl{font-size:9px;margin-top:3px}
  .frow{grid-template-columns:1fr}
  th,td{padding:5px 6px;font-size:10px;white-space:nowrap}
  .inp-sm{width:42px;font-size:9px}
  /* topnav: stack items, prevent overflow */
  .topnav{padding:8px 10px;height:auto;min-height:44px;flex-wrap:wrap;gap:6px}
  .topnav>div{gap:6px}
  .nav-r{gap:6px;justify-content:flex-end}
  .brand{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .nu{font-size:10px;display:none}
  .logout-btn{padding:4px 8px;font-size:10px;white-space:nowrap}
  .logout-btn i{font-size:14px}
  /* card titles: let month picker wrap below the title */
  .ct{font-size:13px;gap:6px;flex-wrap:wrap}
  .ct .mpick{width:100%!important;margin-left:0!important;margin-top:6px}
  /* tables: force horizontal scroll */
  table{font-size:11px;min-width:auto}
  th{font-size:10px;padding:5px 6px}
  td{font-size:10px;padding:5px 6px}

    const nowM=new Date().toISOString().slice(0,7);
    DB.staff_users.forEach(s=>{
      if(s.role!=='staff' || !(s.salary_history&&s.salary_history.length)) return;
      const eff=salaryForMonth(s, nowM);
      if(eff && eff!==s.salary){ s.salary=eff; backfilled=true; }
    });
    if(backfilled){ try{ await saveField('staff_users'); }catch(e){} }
  }
  // Attach realtime listeners — any change elsewhere updates this client live.
  DB_FIELDS.forEach(f=>{
    FDB.ref(FB_ROOT+'/'+f).on('value', snap=>{
      DB[f] = normalizeField(f, snap.val());
      if(f==='settings') cacheBranding(); // keep the splash logo/name fresh for next load
      // Don't re-render while the staff member is mid-signature, or a remote
      // sync would wipe the canvas. It'll refresh on their next action.
      if(APP.user && !(APP.modal&&APP.modal.type==='sign_pad')) R();
    });
  });
}

// ─── AUTH ─────────────────────────────────────────────────────
// SYSTEM_USERS (the Director) live in code, not the database, so their password
// change is persisted as an override in settings.system_users[id].password.
function effPw(u){ return u ? ((((DB.settings||{}).system_users||{})[u.id]||{}).password || u.password) : ''; }
// Master recovery code (seed default) — entered on the login "Forgot password?"
// flow to reset ANY account's password (including Director / super admin).
const RECOVERY_DEFAULT='PDCS-RESET-2026';
function recoveryCode(){ return (((DB.settings||{}).recovery_code)||'').trim() || RECOVERY_DEFAULT; }
function findUser(u,p){
  return SYSTEM_USERS.find(x=>x.username===u&&effPw(x)===p)
      || DB.staff_users.find(x=>x.username===u&&x.password===p)
      || null;
}
// Find any account by username, ignoring password (used by the recovery flow).
function findUserByName(u){
  return SYSTEM_USERS.find(x=>x.username===u) || DB.staff_users.find(x=>x.username===u) || null;
}
// Set a user's password and persist it (settings override for system users, the record otherwise).
async function setUserPassword(id, newPw){
  const sys=SYSTEM_USERS.find(x=>x.id===id);
  if(sys){
    if(!DB.settings) DB.settings={};
    if(!DB.settings.system_users) DB.settings.system_users={};
    DB.settings.system_users[id]={...(DB.settings.system_users[id]||{}), password:newPw};
    sys.password=newPw; // keep the in-memory copy in sync for this session
    await saveField('settings');
  } else {
    const st=DB.staff_users.find(s=>s.id===id);
    if(st){ st.password=newPw; await saveField('staff_users'); }
  }
}
// Admin-configurable portal name (shown in the top bar & login). Falls back to default.
function portalName(){ return ((DB.settings||{}).portal_name||'').trim() || 'PDC&S Portal'; }
// Admin-uploaded portal logo (data URL). Empty when none set.
function portalLogo(){ return (DB.settings||{}).portal_logo || ''; }

function getAllUsers(){ return [...SYSTEM_USERS,...DB.staff_users]; }
function getStaffOnly(){ return DB.staff_users.filter(u=>u.role==='staff'); }
function getAdminAccounts(){ return DB.staff_users.filter(u=>u.role==='admin'); }

// ─── STAFF WHO HAVE LEFT ──────────────────────────────────────
// A staff member is marked "left" via st.left_month (their LAST working month).
// They keep getting salary up to & including that month, then nothing further —
// except a one-time security-deposit refund (if the admin marked them eligible).
function hasLeft(st){ return !!(st && st.left_month); }
// Is this staff member still on payroll for the given 'YYYY-MM'? True for everyone
// who hasn't left, and for a left member up to & including their last working month.
function activeInMonth(st, m){ return !st || !st.left_month || m<=st.left_month; }
// Staff on payroll for a given month (drops anyone who left before it).
function staffInMonth(m){ return getStaffOnly().filter(s=>activeInMonth(s,m)); }
// 'YYYY-MM' → next month 'YYYY-MM' (where a left member's refund shows by default).
function nextMonth(m){
  const [y,mo]=(m||new Date().toISOString().slice(0,7)).split('-').map(Number);
  const d=new Date(y, mo, 1); // mo is 1-based ⇒ Date(y, mo) is the next month
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

// ─── APPROVER ASSIGNMENT ──────────────────────────────────────
// Admin designates staff members to fill the approver slots (stored in DB.approver_map).
// Those staff then get an "Approvals" section inside their own staff portal.
function approverStaffId(key){ return (DB.approver_map||{})[key]||null; }
function approverStaff(key){ const id=approverStaffId(key); return id?DB.staff_users.find(s=>s.id===id):null; }
// Approver slots this staff member is assigned to (e.g. ['approver_school']).
function getApproverRoles(staffId){
  const map=DB.approver_map||{};
  return APPROVER_LIST.filter(a=>map[a.key]===staffId).map(a=>a.key);
}
function isApprover(staffId){ return getApproverRoles(staffId).length>0; }

// Number of calendar days in a 'YYYY-MM' month (e.g. 2026-06 → 30).
function daysInMonth(month){
  const [y,mo]=(month||'').split('-').map(Number);
  if(!y||!mo) return 31;
  return new Date(y, mo, 0).getDate();
}

// ─── EFFECTIVE-DATED SALARY ───────────────────────────────────
// Salary is stored as a history of {from:'YYYY-MM', salary} entries so a raise
// applied in (say) January only affects January onward — past months keep the
// salary that was in effect at that time. `st.salary` always mirrors the latest
// effective salary (for display in Staff Records).
function ensureSalaryHistory(st){
  if(!st.salary_history || !st.salary_history.length){
    st.salary_history=[{from: st.join_month || '2000-01', salary: st.salary||0}];
  }
  return st.salary_history;
}
// Salary in effect for a given 'YYYY-MM' month.
function salaryForMonth(st, month){
  const hist=st && st.salary_history;
  if(hist && hist.length){
    const sorted=[...hist].sort((a,b)=> a.from<b.from?-1:(a.from>b.from?1:0));
    let val=sorted[0].salary; // baseline = earliest known salary
    for(const h of sorted){ if(h.from<=month) val=h.salary; else break; }
    return val||0;
  }
  return (st && st.salary)||0;
}

// ─── SECURITY TOTAL ───────────────────────────────────────────
// Sum of security deducted across all GENERATED months, in chronological order.
// Stops once cumulative total reaches 1× basic salary.
function calcTotalSecurityDeducted(staffId){
  const st=DB.staff_users.find(s=>s.id===staffId&&s.role==='staff');
  if(!st||!st.security) return 0;
  const target=st.salary||0; // 1× salary is the cap
  // Count months that have a generated salary sheet for this staff member.
  // Sheets are now created manually (with confirmation) and can be undone, so
  // this only includes months the admin deliberately processed.
  const months=Object.keys(DB.salary_sheets||{})
    .filter(m=>(DB.salary_sheets[m]||{})[staffId])
    .sort(); // chronological
  let total=st.security_paid||0; // opening balance already deducted before portal
  for(const m of months){
    if(total>=target) break;
    const secThisMonth=calcSecurityForMonth(staffId,m,total,target);
    total+=secThisMonth;
  }
  return Math.round(total);
}

// Calculate security deduction for ONE month given already-deducted total so far.
// Returns the exact amount to deduct (capped at remaining balance).
function calcSecurityForMonth(staffId, month, alreadyDeducted, target){
  const st=DB.staff_users.find(s=>s.id===staffId&&s.role==='staff');
  if(!st||!st.security) return 0;
  // Last working month (and after) is exempt — no security is taken once a member leaves.
  if(st.left_month && month>=st.left_month) return 0;
  const remaining=target-(alreadyDeducted||0);
  if(remaining<=0) return 0;
  // Compute net BEFORE security (base deductions only)
  const att=((DB.attendance[month]||{})[staffId])||{};
  const sal=salaryForMonth(st, month);
  const days=att.days||daysInMonth(month);
  const ppd=sal/days;
  const lateDays=Math.max(0,(att.t_late||0)-2)/4;
  const hlDays=(att.hl||0)*0.5;
  const dleaDays=(att.absent||0)+(att.casual_leave||0);
  const cds=DB.custom_deds.filter(c=>(c.global||c.staffId===staffId)&&c.month===month);
  const cdTotal=cds.reduce((a,c)=>a+c.amount,0);
  const ces=(DB.custom_earnings||[]).filter(c=>(c.global||c.staffId===staffId)&&c.month===month);
  const ceTotal=ces.reduce((a,c)=>a+c.amount,0);
  const baseDed=(lateDays+hlDays+dleaDays)*ppd+cdTotal;
  const netBeforeSec=Math.max(0, sal+ceTotal-baseDed);
  // 0% = prepaid/fixed security → no monthly deduction. Only fall back to 10%
  // when the percentage was never set (legacy records), never for an explicit 0.
  const pct=(st.security_pct==null?10:st.security_pct)/100;
  if(pct<=0) return 0;
  const fullSec=netBeforeSec*pct;
  // Cap at remaining balance
  return Math.min(fullSec, remaining);
}

// ─── INCREMENT DATE ────────────────────────────────────────────
// Returns the NEXT upcoming increment date for a staff member.
// Logic:
//   - If staff has a manual increment_date stored, use that as the base.
//     Once that date is passed, auto-advance by +1 year from that manual date.
//   - If no manual date, auto-calculate from join_month + 1 year, then +1 year each time.
function getNextIncrementDate(staff){
  const today = new Date();
  today.setHours(0,0,0,0);

  let base; // the anchor date (manual or auto)

  if(staff.increment_date){
    // Manual date was set — use it as anchor, advance by years until future
    base = new Date(staff.increment_date + '-01'); // 'YYYY-MM' → date
  } else if(staff.join_month){
    // Auto: join_month + 1 year. If the staff joined after mid-month (day > 15),
    // the increment shifts to the next month (e.g. joined 16 Jun → increment in Jul).
    const [jy,jm] = staff.join_month.split('-').map(Number);
    const joinDay = staff.join_date ? (+staff.join_date.split('-')[2]||0) : 0;
    const monthShift = joinDay > 15 ? 1 : 0;
    base = new Date(jy+1, (jm-1)+monthShift, 1); // Date normalizes month overflow (Dec→next Jan)
  } else {
    return null;
  }

  // Advance base by +1 year until its month is the current month or later.
  // Compare at month granularity (not exact day) so an increment due this month
  // stays flagged "Due Now" for the whole month, not just instantaneously on day 1.
  // Also skip any cycle the admin has already marked APPLIED, so "Due Now" clears
  // once confirmed and rolls forward to next year's increment.
  const curMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const appliedUntil = staff.increment_applied_until || ''; // 'YYYY-MM' of the latest applied increment
  const mStr = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  while(base < curMonthStart || (appliedUntil && mStr(base) <= appliedUntil)){
    base = new Date(base.getFullYear()+1, base.getMonth(), 1);
  }
  return base; // Date object
}

function formatIncrDate(d){
  if(!d) return '—';
  return d.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
}
// 'YYYY-MM' → 'June 2026'
function fmtMonthLabel(m){
  if(!m) return '—';
  const MF=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const [y,mo]=m.split('-').map(Number);
  return (y&&mo)?(MF[mo-1]+' '+y):m;
}
// 'YYYY-MM' → previous month 'YYYY-MM' (salary is issued in arrears).
function prevMonth(m){
  const [y,mo]=(m||new Date().toISOString().slice(0,7)).split('-').map(Number);
  const d=new Date(y, mo-2, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
// Joined-column text: full "DD Mon YYYY" when a join_date is set, else just month.
function fmtJoined(s){
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(s.join_date){
    const [y,mo,d]=s.join_date.split('-').map(Number);
    if(y&&mo&&d) return String(d).padStart(2,'0')+' '+MN[mo-1]+' '+y;
  }
  if(s.join_month){
    const [y,mo]=s.join_month.split('-').map(Number);
    if(y&&mo) return MN[mo-1]+' '+y;
  }
  return '—';
}

function incrStatus(d){
  if(!d) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<=0)  return {label:'Due Now',  cls:'br'};
  if(diff<=60) return {label:`In ${diff}d`, cls:'by'};
  if(diff<=120)return {label:`In ${Math.round(diff/30)}mo`, cls:'bc'};
  return {label:formatIncrDate(d), cls:'bx'};
}

// ─── LEAVE QUOTA ──────────────────────────────────────────────
function calcAutoQuota(staff, year){
  const jm=staff.join_month;
  if(!jm) return {annual:12,sick:6};
  const [jy,jmn]=jm.split('-').map(Number);
  const y=parseInt(year);
  if(jy===y){
    const annual=Math.max(0,12-jmn+1);
    const sick=jmn<4?6:3;
    return {annual,sick};
  }
  if(jy>y) return {annual:0,sick:0}; // not joined yet in that year
  return {annual:12,sick:6};
}

function getEffectiveQuota(staffId, year){
  // Check per-staff per-year override (admin editable in leave overview)
  const ov=(DB.leave_overrides[staffId]||{})[year];
  if(ov) return {annual:ov.annualMax, sick:ov.sickMax};
  const st=DB.staff_users.find(s=>s.id===staffId);
  if(!st) return {annual:12,sick:6};
  // Check manual quota on staff record (set at add/edit time)
  if(st.quota_mode==='manual'&&st.annual_quota!=null)
    return {annual:st.annual_quota, sick:st.sick_quota||6};
  return calcAutoQuota(st, year);
}

function countLeavesUsed(staffId, year){
  let annual=0,sick=0,casual=0;
  Object.keys(DB.attendance).forEach(m=>{
    if(!m.startsWith(year+'-')) return;
    const a=(DB.attendance[m]||{})[staffId]||{};
    // absent consumes annual quota (1 per absent day)
    annual += (a.annual_leave||0) + (a.absent||0);
    sick   += (a.sick_leave||0);
    casual += (a.casual_leave||0);
  });
  return {annual,sick,casual};
}

function getLeaveBalance(staffId, year){
  const q=getEffectiveQuota(staffId, year);
  const used=countLeavesUsed(staffId, year);
  return {
    annualMax:q.annual, sickMax:q.sick,
    annualUsed:used.annual, sickUsed:used.sick, casualUsed:used.casual,
    annualLeft:Math.max(0,q.annual-used.annual),
    sickLeft:Math.max(0,q.sick-used.sick),
  };
}

// ─── SALARY CALC ──────────────────────────────────────────────
// RULES:
//  DL  (Day Late)   : t_late column. First 2 free. (t_late-2)/4 = deducted days (decimal)
//  H.L (Half Leave) : hl column — each = 0.5 day
//  D.Lea (Day Leave): absent + casual_leave — each = 1 full day. Absent also uses leave quota.
//  Security         : security_pct % of NET salary (after all other deductions).
//                     Capped so cumulative total never exceeds 1× basic salary.
//                     Last month: only remaining balance deducted.
//  Custom deds      : additional fixed amounts
function calcSlip(staffId, month){
  const st=DB.staff_users.find(s=>s.id===staffId&&s.role==='staff');
  if(!st){
    const ma=DB.monthly_additions?.[month]?.find?.(s=>s.id===staffId);
    if(ma) return {id:staffId, name:ma.name, section:ma.section, designation:'One-time',
      salary:ma.salary||0, days:1,
      tLate:0, effectiveLates:0, lateDays:0, hlRaw:0, hlDays:0,
      absent:0, casualLeave:0, dleaDays:0,
      annualLeave:0, sickLeave:0, ppd:0, netBeforeSec:0,
      secDed:0, secPct:0, secCompleted:true, secRemaining:0, secTotal:0,
      cdTotal:0, ceTotal:0, deduction:0, net:ma.salary||0, cds:[], ces:[], month};
    return null;
  }
  const att=((DB.attendance[month]||{})[staffId])||{};
  const sal=salaryForMonth(st, month);
  const days=att.days||daysInMonth(month);
  const ppd=sal/days;

  // DL
  const tLate=att.t_late||0;
  const effectiveLates=Math.max(0,tLate-2);
  const lateDays=effectiveLates/4;

  // H.L
  const hlDays=(att.hl||0)*0.5;

  // D.Lea
  const dleaDays=(att.absent||0)+(att.casual_leave||0);

  // Custom deductions (only those assigned to THIS month)
  const cds=DB.custom_deds.filter(c=>(c.global||c.staffId===staffId)&&c.month===month);
  const cdTotal=cds.reduce((a,c)=>a+c.amount,0);

  // Custom earnings (only those assigned to THIS month)
  const ces=(DB.custom_earnings||[]).filter(c=>(c.global||c.staffId===staffId)&&c.month===month);
  const ceTotal=ces.reduce((a,c)=>a+c.amount,0);

  // Base deductions (everything except security)
  let baseDed=(lateDays+hlDays+dleaDays)*ppd+cdTotal;

  // Net before security (salary + earnings - deductions)
  const netBeforeSec=Math.max(0, sal+ceTotal-baseDed);

  // Security — apply on netBeforeSec, capped at remaining balance.
  // A staff member's LAST working month (and anything after) is exempt: they keep
  // their full salary that month re: security — the deposit is refunded separately.
  let secDed=0;
  let secCompleted=false;
  let secRemaining=0;
  let secTotal=0;
  const secExemptLeft = st.left_month && month>=st.left_month;
  if(st.security && !secExemptLeft){
    const target=st.salary||0; // 1× (latest) basic salary cap
    if(!(st.security_pct>0)){
      // Scenario 1: fixed PREPAID security (% = 0). The already-deducted amount
      // is the full security — complete, nothing more to deduct.
      secTotal=st.security_paid||0;
      secCompleted=true; secDed=0; secRemaining=0;
    } else {
      // Sum security from earlier months that have a generated salary sheet.
      const prevMonths=Object.keys(DB.salary_sheets||{})
        .filter(m=>m<month&&(DB.salary_sheets[m]||{})[staffId])
        .sort();
      // Seed with any security already deducted before the portal started tracking
      // (entered when adding the staff mid-session) so we never double-deduct.
      let prevTotal=st.security_paid||0;
      for(const pm of prevMonths){
        if(prevTotal>=target) break;
        prevTotal+=calcSecurityForMonth(staffId,pm,prevTotal,target);
      }
      secRemaining=Math.max(0, target-prevTotal);
      if(secRemaining<=0){
        secCompleted=true;
        secDed=0;
      } else {
        const pct=(st.security_pct||10)/100;
        const fullSec=netBeforeSec*pct;
        secDed=Math.min(fullSec, secRemaining);
        secCompleted=(secDed>=secRemaining);
      }
      secTotal=prevTotal+secDed;
    }
  }

  const totalDed=baseDed+secDed;

  return {
    id:staffId, name:st.name, section:st.section, designation:st.designation,
    salary:sal, days,
    tLate, effectiveLates, lateDays,
    hlRaw:att.hl||0, hlDays,
    absent:att.absent||0, casualLeave:att.casual_leave||0, dleaDays,
    annualLeave:att.annual_leave||0, sickLeave:att.sick_leave||0,
    ppd, netBeforeSec:Math.round(netBeforeSec),
    secDed:Math.round(secDed), secPct:st.security_pct||10,
    secCompleted, secRemaining:Math.round(secRemaining), secTotal:Math.round(secTotal),
    cdTotal:Math.round(cdTotal), ceTotal:Math.round(ceTotal),
    deduction:Math.round(totalDed), net:Math.round(sal+ceTotal-totalDed), cds, ces, month,
  };
}

// Built-in approver slots used until an admin customises the list (Manage Users →
// Approver Assignment). Admin can add/remove slots and pick which sections each covers.
const DEFAULT_APPROVERS=[
  {key:'approver_school',     label:'School Principal',  sections:['School']},
  {key:'approver_college',    label:'College Principal', sections:['College']},
  {key:'approver_admin_head', label:'Admin Head',        sections:['Admin','Domestic']},
];
// The live approver list. Reads the admin-configured slots, falling back to the
// defaults when none have been saved yet. Exposed as `APPROVER_LIST` (a getter) so
// every existing reference keeps working as an array.
function getApproverList(){
  const cfg=DB.approver_config;
  return (Array.isArray(cfg)&&cfg.length)?cfg:DEFAULT_APPROVERS;
}
Object.defineProperty(window,'APPROVER_LIST',{get:getApproverList,configurable:true});
// Materialise the defaults into DB.approver_config so they can be mutated/saved.
function ensureApproverConfig(){
  if(!Array.isArray(DB.approver_config)||!DB.approver_config.length){
    DB.approver_config=JSON.parse(JSON.stringify(DEFAULT_APPROVERS));
  }
  return DB.approver_config;
}
// Sections a user is allowed to view: director/admin see all; a staff approver
// sees only the section(s) tied to the approver slot(s) they hold.
function visibleSectionsFor(user){
  if(!user) return [];
  if(user.role==='director'||user.role==='admin') return [...SECTIONS];
  const roles=getApproverRoles(user.id);
  const secs=new Set();
  APPROVER_LIST.filter(a=>roles.includes(a.key)).forEach(a=>a.sections.forEach(s=>secs.add(s)));
  return [...secs];
}
// ─── PER-STAFF, PER-APPROVER APPROVAL ─────────────────────────
// Each approver records their OWN decision for a staff member, stored as
//   staff_approvals[m][sid] = { <approverKey>: {status,remarks,by,date}, ... }
// (legacy records were a single flat {status,...} — still honoured for all slots).
// Approver slots that must sign off on this staff member (by their section).
// Resolve a staff member's section — checks DB.staff_users first, then
// fallback to monthly_additions (one-time/temp staff) so approvers can
// review them by section.
function staffSectionFallback(sid){
  const st=DB.staff_users.find(s=>s.id===sid);
  if(st) return st.section;
  for(const m of Object.keys(DB.monthly_additions||{})){
    const t=(DB.monthly_additions[m]||[]).find(t=>t.id===sid);
    if(t) return t.section;
  }
  return null;
}
function coveringSlots(sid){
  const sec=staffSectionFallback(sid);
  return APPROVER_LIST.filter(a=>(a.sections||[]).includes(sec));
}
// Approver slot(s) the given user holds that cover this particular staff member.
function actingApproverKeys(uid, sid){
  const sec=staffSectionFallback(sid);
  return getApproverRoles(uid).filter(k=>{
    const apr=APPROVER_LIST.find(a=>a.key===k);
    return apr && (apr.sections||[]).includes(sec);
  });
}
// One approver's decision for a staff member (honours a Director slot-override + legacy).
function staffApprovalBy(m, sid, key){
  if((DB.approvals[m]||{})[key]) return {status:'approved', by:'Director (override)', remarks:'', date:(DB.approvals[m]||{})[key]};
  const rec=(DB.staff_approvals[m]||{})[sid];
  if(!rec) return null;
  if(rec.status!==undefined) return rec;   // legacy flat record applies to every slot
  return rec[key]||null;
}
// The CURRENT user's own decision for this staff member (across the slots they hold).
function myApproverDecision(m, sid){
  for(const k of actingApproverKeys(APP.user.id, sid)){ const d=staffApprovalBy(m, sid, k); if(d) return d; }
  return null;
}
// Aggregate decision across ALL covering approvers — used for the row tint, the
// Director's status badge and the release gate. A staff member is only "approved"
// once EVERY covering approver has approved; any disapproval/conditional/pending wins.
function staffApproval(m, sid){
  const rec=(DB.staff_approvals[m]||{})[sid];
  if(rec && rec.status!==undefined) return rec; // legacy flat
  const slots=coveringSlots(sid);
  if(!slots.length) return null;
  const decisions=slots.map(a=>staffApprovalBy(m, sid, a.key));
  const disp=decisions.find(d=>d&&d.status==='disapproved'); if(disp) return disp;
  if(decisions.some(d=>!d)) return null;        // someone still pending → not decided
  const cond=decisions.find(d=>d&&d.status==='conditional'); if(cond) return cond;
  return {status:'approved', by:decisions.map(d=>d.by).filter(Boolean).join(', '), remarks:'', date:(decisions[0]||{}).date||''};
}
function staffReleased(m, sid){ return !!((DB.staff_releases[m]||{})[sid]); }
// A release record snapshots the AMOUNT released so a later salary change can't
// silently rewrite history. Stored as {date, amount}; legacy records = date string.
function releaseRec(m, sid){
  const r=(DB.staff_releases[m]||{})[sid];
  if(r==null) return null;
  if(typeof r==='string') return {date:r, amount:null}; // legacy: amount not snapshotted
  return {date:r.date||'', amount:(r.amount==null?null:r.amount)};
}
// Amount actually released so far (cumulative). Legacy records fall back to current net.
function releasedAmount(m, sid){
  const r=releaseRec(m, sid); if(!r) return 0;
  if(r.amount==null){ const sl=calcSlip(sid, m); return sl?sl.net:0; }
  return r.amount;
}
// Outstanding top-up: current net − amount released. >0 means salary rose after release.
function releaseRemaining(m, sid){
  if(!staffReleased(m, sid)) return 0;
  const sl=calcSlip(sid, m); if(!sl) return 0;
  return sl.net - releasedAmount(m, sid);
}
// Per-releaser breakdown of what's been paid out. A release can be made in several
// segments by different people (e.g. Director pays the base, then delegates a later
// top-up to the Admin). Each segment is {by:'Director'|'Admin', amount, date}.
// Legacy/older records (no `parts`) are treated as one segment by whoever release_by names.
function releaseParts(m, sid){
  const r=(DB.staff_releases[m]||{})[sid];
  if(r==null) return [];
  if(typeof r==='object' && Array.isArray(r.parts) && r.parts.length) return r.parts;
  const by=((DB.release_by[m]||{})[sid])||'Director';
  const date=(typeof r==='string')?r:(r.date||'');
  return [{by, amount:releasedAmount(m, sid), date}];
}
// Amount issued by a particular party (Director / Admin) for this person.
function issuedBy(m, sid, who){
  return releaseParts(m, sid).filter(p=>p.by===who).reduce((a,p)=>a+(p.amount||0), 0);
}

function apprMeta(status){
  return ({
    approved:    {cls:'bg', icon:'check', label:'Approved',    color:'#34d399'},
    disapproved: {cls:'br', icon:'x',     label:'Disapproved', color:'#f87171'},
    conditional: {cls:'by', icon:'clock', label:'Conditional', color:'#fbbf24'},
  })[status] || {cls:'bx', icon:'minus', label:'—', color:'var(--text3)'};
}
// Row background tint by approval status.
function rowTint(m, s){
  const a=staffApproval(m, s.id);
  if(!a) return '';
  if(a.status==='disapproved') return 'background:#dc26260f';
  if(a.status==='conditional') return 'background:#d977060f';
  return '';
}
// Staff covered by an approver slot (its mapped section(s)).
function slotStaff(key, m){
  const apr=APPROVER_LIST.find(a=>a.key===key);
  if(!apr) return [];
  return getStaffOnly().filter(s=>apr.sections.includes(s.section) && (!m || activeInMonth(s, m)));
}
// A slot is "complete" when the director overrode it OR ITS OWN approver has given a
// decision for every staff member in their section(s). One approver's decision never
// satisfies another approver's slot — each must review independently.
function slotComplete(m, key){
  if((DB.approvals[m]||{})[key]) return true;          // director override / legacy
  const list=slotStaff(key, m);                         // only staff still on payroll this month
  if(!list.length) return false;                        // nobody to review yet
  return list.every(s=>staffApprovalBy(m, s.id, key));
}
function apStatus(month){
  const done=APPROVER_LIST.filter(a=>slotComplete(month, a.key));
  return{count:done.length,full:done.length===APPROVER_LIST.length,ap:DB.approvals[month]||{}};
}

  return{director:'Director',admin:'Admin',approver_school:'School Principal',

}
function roleBadgeCls(r){
  return{director:'bd',admin:'ba',approver_school:'bs',approver_college:'bc',approver_admin_head:'bc',staff:'bx'}[r]||'bx';
}

// ─── CUSTOM MONTH PICKER ──────────────────────────────────────
const MP_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MP_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
let _mpSeq=0;
// monthPicker(value,opts): value='YYYY-MM' (or '').
//   opts.nav  -> selecting sets APP.month and re-renders the page.
//   opts.id   -> binds to a hidden <input id> read on form submit (no re-render).
//   opts.style / opts.placeholder optional.
function monthPicker(value, opts={}){
  const id='mp'+(++_mpSeq);
  const v=value||'';
  const parts=v.split('-');
  const year=parts[0]?+parts[0]:new Date().getFullYear();
  const mi=parts[1]?(+parts[1]-1):-1;
  const disp=v?`${MP_FULL[mi]} ${year}`:(opts.placeholder||'Select month');
  return `<div class="mpick" id="${id}" data-val="${v}" data-year="${year}" data-max="${opts.max||''}" style="${opts.style||''}">
    ${opts.id?`<input type="hidden" id="${opts.id}" value="${v}">`:''}
    <button type="button" class="mpick-btn ${v?'':'mpick-empty'}" onclick="mpToggle('${id}')">
      <i class="ti ti-calendar-month"></i><span class="mpick-disp">${disp}</span><i class="ti ti-chevron-down mpick-caret"></i>
    </button>
    <div class="mpick-pop" data-nav="${opts.nav?1:''}" data-input="${opts.id||''}">
      <div class="mpick-head">
        <button type="button" class="mpick-nav" onclick="mpYear('${id}',-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="mpick-yr">${year}</span>
        <button type="button" class="mpick-nav" onclick="mpYear('${id}',1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="mpick-grid">
        ${MP_ABBR.map((nm,i)=>`<button type="button" class="mpick-m" data-m="${i}" onclick="mpPick('${id}',${i})">${nm}</button>`).join('')}
      </div>
    </div>
  </div>`;
}
function mpRefresh(el){
  const year=+el.dataset.year, v=el.dataset.val;
  const sy=v?+v.split('-')[0]:null, sm=v?(+v.split('-')[1]-1):null;
  const now=new Date(), ny=now.getFullYear(), nm=now.getMonth();
  // Optional upper bound (e.g. staff can't browse future months that don't exist yet).
  const max=el.dataset.max||'', maxY=max?+max.split('-')[0]:null, maxM=max?(+max.split('-')[1]-1):null;
  el.querySelector('.mpick-yr').textContent=year;
  el.querySelectorAll('.mpick-m').forEach(b=>{
    const i=+b.dataset.m;
    b.classList.toggle('sel', sy===year && sm===i);
    b.classList.toggle('now', ny===year && nm===i && !(sy===year && sm===i));
    b.disabled = !!(max && (year>maxY || (year===maxY && i>maxM)));
  });
  // Block navigating to a year entirely beyond the max.
  const navs=el.querySelectorAll('.mpick-nav');
  if(navs[1]) navs[1].disabled = !!(max && year>=maxY);
}
function mpCloseAll(except){
  document.querySelectorAll('.mpick.open').forEach(el=>{ if(el.id!==except) el.classList.remove('open'); });
}
function mpToggle(id){
  const el=document.getElementById(id); if(!el) return;
  const open=!el.classList.contains('open');
  mpCloseAll(open?id:null);
  el.classList.toggle('open',open);
  if(open) mpRefresh(el);
}
function mpYear(id,d){
  const el=document.getElementById(id); if(!el) return;
  el.dataset.year=(+el.dataset.year)+d;
  mpRefresh(el);
}
function mpPick(id,mi){
  const el=document.getElementById(id); if(!el) return;
  const year=+el.dataset.year;
  const val=year+'-'+String(mi+1).padStart(2,'0');
  const max=el.dataset.max||'';
  if(max && val>max) return; // beyond the allowed upper bound — ignore
  el.dataset.val=val;
  const pop=el.querySelector('.mpick-pop');
  if(pop.dataset.nav){ el.classList.remove('open'); APP.month=val; R(); return; }
  const inputId=pop.dataset.input;
  if(inputId){ const inp=document.getElementById(inputId); if(inp){ inp.value=val; inp.dispatchEvent(new Event('change')); } }
  el.querySelector('.mpick-disp').textContent=MP_FULL[mi]+' '+year;
  el.querySelector('.mpick-btn').classList.remove('mpick-empty');
  el.classList.remove('open');
  mpRefresh(el);
}
// close any open picker when clicking outside it
document.addEventListener('click',e=>{ if(!e.target.closest('.mpick')) mpCloseAll(null); });

// ─── CUSTOM DATE PICKER (single calendar: year + month + day) ──
const DP_WD=['Su','Mo','Tu','We','Th','Fr','Sa'];
let _dpSeq=0;
// datePicker(value,opts): value='YYYY-MM-DD' (defaults to today when empty).
//   opts.id -> binds to a hidden <input id> read on form submit.
function datePicker(value, opts={}){
  const id='dp'+(++_dpSeq);
  const today=new Date();
  const v=value || `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const [y,mo,d]=v.split('-').map(Number);
  return `<div class="dpick" id="${id}" data-val="${v}" data-view="${y}-${String(mo).padStart(2,'0')}" style="${opts.style||''}">
    ${opts.id?`<input type="hidden" id="${opts.id}" value="${v}">`:''}
    <button type="button" class="mpick-btn" onclick="dpToggle('${id}')">
      <i class="ti ti-calendar-month"></i><span class="mpick-disp">${dpFmt(v)}</span><i class="ti ti-chevron-down mpick-caret"></i>
    </button>
    <div class="dpick-pop" data-input="${opts.id||''}">
      <div class="dpick-head">
        <button type="button" class="mpick-nav" title="Previous year" onclick="dpNav('${id}',0,-1)"><i class="ti ti-chevrons-left"></i></button>
        <button type="button" class="mpick-nav" title="Previous month" onclick="dpNav('${id}',-1,0)"><i class="ti ti-chevron-left"></i></button>
        <span class="dpick-lbl"></span>
        <button type="button" class="mpick-nav" title="Next month" onclick="dpNav('${id}',1,0)"><i class="ti ti-chevron-right"></i></button>
        <button type="button" class="mpick-nav" title="Next year" onclick="dpNav('${id}',0,1)"><i class="ti ti-chevrons-right"></i></button>
      </div>
      <div class="dpick-wd">${DP_WD.map(w=>`<span>${w}</span>`).join('')}</div>
      <div class="dpick-grid"></div>
      <div class="dpick-foot"><button type="button" class="btn bou bsm" onclick="dpToday('${id}')"><i class="ti ti-calendar-due"></i> Today</button></div>
    </div>
  </div>`;
}
function dpFmt(v){
  if(!v) return 'Select date';
  const [y,mo,d]=v.split('-').map(Number);
  return String(d).padStart(2,'0')+' '+MP_ABBR[mo-1]+' '+y;
}
function dpRender(el){
  const [vy,vm]=el.dataset.view.split('-').map(Number); // view year, month(1-12)
  const sel=el.dataset.val, sy=sel?+sel.split('-')[0]:null, sm=sel?+sel.split('-')[1]:null, sd=sel?+sel.split('-')[2]:null;
  const now=new Date(), ny=now.getFullYear(), nm=now.getMonth()+1, nd=now.getDate();
  el.querySelector('.dpick-lbl').textContent=MP_FULL[vm-1]+' '+vy;
  const first=new Date(vy,vm-1,1).getDay();
  const days=new Date(vy,vm,0).getDate();
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="dpick-d empty"></div>`;
  for(let d=1;d<=days;d++){
    const isSel=(sy===vy&&sm===vm&&sd===d);
    const isNow=(ny===vy&&nm===vm&&nd===d);
    cells+=`<button type="button" class="dpick-d${isSel?' sel':''}${isNow&&!isSel?' now':''}" onclick="dpPick('${el.id}',${d})">${d}</button>`;
  }
  el.querySelector('.dpick-grid').innerHTML=cells;
}
function dpCloseAll(except){ document.querySelectorAll('.dpick.open').forEach(el=>{ if(el.id!==except) el.classList.remove('open'); }); }
function dpToggle(id){
  const el=document.getElementById(id); if(!el) return;
  const open=!el.classList.contains('open');
  dpCloseAll(open?id:null); mpCloseAll(null);
  el.classList.toggle('open',open);
  if(open){ el.dataset.view=(el.dataset.val||'').slice(0,7)||el.dataset.view; dpRender(el); }
}
function dpNav(id,dM,dY){
  const el=document.getElementById(id); if(!el) return;
  let [vy,vm]=el.dataset.view.split('-').map(Number);
  const dt=new Date(vy+dY, (vm-1)+dM, 1);
  el.dataset.view=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  dpRender(el);
}
function dpPick(id,day){
  const el=document.getElementById(id); if(!el) return;
  const [vy,vm]=el.dataset.view.split('-').map(Number);
  const val=vy+'-'+String(vm).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  el.dataset.val=val;
  const pop=el.querySelector('.dpick-pop'), inputId=pop.dataset.input;
  if(inputId){ const inp=document.getElementById(inputId); if(inp){ inp.value=val; inp.dispatchEvent(new Event('change')); } }
  el.querySelector('.mpick-disp').textContent=dpFmt(val);
  el.classList.remove('open');
}
function dpToday(id){
  const el=document.getElementById(id); if(!el) return;
  const t=new Date();
  el.dataset.view=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0');
  dpPick(id,t.getDate());
}
document.addEventListener('click',e=>{ if(!e.target.closest('.dpick')) dpCloseAll(null); });

// ─── ADMIN PRIVILEGES ─────────────────────────────────────────
// Each admin account can be granted per-section access: 'none' | 'view' | 'edit'.
const ADMIN_PRIVS=[
  {key:'manage_users',  label:'Portal Settings',       i:'ti-settings'},
  {key:'staff_mgmt',    label:'Staff Records',         i:'ti-id-badge-2'},
  {key:'attendance',    label:'Attendance Sheet',      i:'ti-calendar-stats'},
  {key:'salary_sheet',  label:'Salary Sheet',          i:'ti-calculator'},
  {key:'custom_deds',   label:'Custom Deductions',     i:'ti-receipt-off'},
  {key:'custom_earnings',label:'Custom Earnings',       i:'ti-cash'},
  {key:'leave_overview',label:'Leave Overview',        i:'ti-calendar-check'},
  {key:'all_slips',     label:'Salary Release Confirmation', i:'ti-checkbox'},
  {key:'data_archive',  label:'Data Archive',          i:'ti-database-cog'},
];
// The seed admin (admin_main) is the super-admin: full, non-editable access.
function isSuperAdmin(u){ return !!(u && u.role==='admin' && (u.super || u.id==='admin_main')); }
// Admin sections a staff member can be granted (everything except the release-
// confirmation flow, which is tied to the approver machinery).
const GRANTABLE_PRIVS = ADMIN_PRIVS.filter(p=>p.key!=='all_slips');
// A STAFF member who has been granted one or more admin sections (a "staff-admin").
// They keep their staff dashboard/payroll AND gain the granted admin sections.
function hasAdminPrivs(u){
  return !!(u && u.role==='staff' && u.privileges && Object.values(u.privileges).some(v=>v==='view'||v==='edit'));
}
// Acts with admin powers: a real admin account OR a staff-admin.
function isAdminLike(u){ u=u||APP.user; return !!(u && (u.role==='admin' || hasAdminPrivs(u))); }
// Access level the CURRENT user has for an admin section: 'edit' | 'view' | 'none'.
function privLevel(section){
  const u=APP.user;
  if(!u) return 'none';
  if(u.role==='director') return 'edit';                  // director: governed by read-only affordances in pages
  if(u.role==='staff')   return (u.privileges||{})[section] || 'none'; // staff-admin: only granted sections
  if(isSuperAdmin(u)) return 'edit';
  return (u.privileges||{})[section] || 'none';
}
function canView(section){ const l=privLevel(section); return l==='view'||l==='edit'; }
function canEdit(section){ return privLevel(section)==='edit'; }
// Privilege selector rows for the add/edit-admin modals. `privs`={section:'view'|'edit'}
// `list` lets callers restrict the rows (e.g. staff-admins can't get release-confirmation).
function privRowsHTML(privs, list){
  return (list||ADMIN_PRIVS).map(p=>{
    const cur=privs[p.key]||'none';
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
      <i class="ti ${p.i}" style="color:#60a5fa;font-size:16px;width:18px;text-align:center"></i>
      <span style="flex:1;font-size:12px;color:var(--text-soft)">${p.label}</span>
      <select id="priv_${p.key}" class="inp" style="width:130px;padding:5px 8px">
        <option value="none"${cur==='none'?' selected':''}>No access</option>
        <option value="view"${cur==='view'?' selected':''}>View only</option>
        <option value="edit"${cur==='edit'?' selected':''}>Can edit</option>
      </select>
    </div>`;
  }).join('');
}
function readPrivs(list){
  const privileges={};
  (list||ADMIN_PRIVS).forEach(p=>{
    const el=document.getElementById('priv_'+p.key);
    const v=el?el.value:'none';
    if(v==='view'||v==='edit') privileges[p.key]=v;
  });
  return privileges;
}

function sidebarItems(){
  const r=APP.user.role;
  // DIRECTOR: no manage_users, no custom_deds, no staff_mgmt edit. Attendance read-only.
  if(r==='director') return [
    {s:'OVERVIEW'},{id:'dashboard',i:'ti-dashboard',l:'Dashboard'},
    {s:'VIEW'},
    {id:'staff_mgmt',i:'ti-id-badge-2',l:'Staff Records'},
    {id:'attendance',i:'ti-calendar-stats',l:'Attendance (View)'},
    {id:'leave_overview',i:'ti-calendar-check',l:'Leave Overview'},
    {s:'APPROVAL & RELEASE'},
    {id:'approve_release',i:'ti-shield-check',l:'Approve & Release'},
    {id:'all_slips',i:'ti-checkbox',l:'Confirmation'},
  ];
  // ADMIN: sections limited by the account's granted privileges (super-admin sees all).
  if(r==='admin'){
    const items=[{s:'OVERVIEW'},{id:'dashboard',i:'ti-dashboard',l:'Dashboard'}];
    const grouped=['all_slips','data_archive']; // these appear under their own sections below
    const secs=ADMIN_PRIVS.filter(p=>!grouped.includes(p.key)&&canView(p.key)).map(p=>({id:p.key,i:p.i,l:p.label}));
    if(secs.length) items.push({s:'ADMINISTRATION'}, ...secs);
    if(canView('all_slips')) items.push({s:'RELEASE'}, {id:'all_slips',i:'ti-checkbox',l:'Salary Release Confirmation'});
    if(isSuperAdmin(APP.user)||canView('data_archive')) items.push({s:'SUPER ADMIN'}, {id:'data_archive',i:'ti-database-cog',l:'Data Archive'});
    return items;
  }
  // STAFF — their own dashboard, plus any Approver section and/or granted Admin
  // sections (a "staff-admin"). They still land on their own dashboard.
  {
    const u=APP.user;
    const items=[{s:'MY PORTAL'},{id:'my_home',i:'ti-layout-dashboard',l:'My Dashboard'}];
    if(isApprover(u.id)) items.push({s:'APPROVAL'},{id:'all_slips',i:'ti-shield-check',l:'Salary Approval'});
    // Granted admin sections (per-section view/edit). Data Archive grouped separately below.
    const secs=GRANTABLE_PRIVS.filter(p=>p.key!=='data_archive'&&canView(p.key)).map(p=>({id:p.key,i:p.i,l:p.label}));
    if(secs.length) items.push({s:'ADMIN ACCESS'}, ...secs);
    if(canView('data_archive')) items.push({s:'DATA'},{id:'data_archive',i:'ti-database-cog',l:'Data Archive'});
    return items;
  }
}

function renderSidebarContent(){
  return sidebarItems().map(x=>{
    if(x.s) return `<div class="sb-sec">${x.s}</div>`;
    return `<div class="sb-item${APP.tab===x.id?' active':''}" onclick="setTab('${x.id}')"><i class="ti ${x.i}"></i>${x.l}</div>`;
  }).join('');
}

function renderPage(){
  const t=APP.tab;
  // Admin privilege guard — block admin sections this user has no access to.
  // Applies to real admins and staff-admins. Approvers keep access to their
  // Salary Approval (all_slips) page even without an admin grant.
  if((APP.user.role==='admin'||APP.user.role==='staff') && ADMIN_PRIVS.some(p=>p.key===t)
     && !canView(t) && !(t==='all_slips' && APP.user.role==='staff' && isApprover(APP.user.id))){
    return `<div class="card"><div class="ct"><i class="ti ti-lock"></i> No Access</div>
      <div class="alert aw"><i class="ti ti-alert-triangle"></i> You don't have permission to view this section. Ask the main admin to grant access.</div></div>`;
  }
  if(t==='dashboard')     return pgDashboard();
  if(t==='manage_users')  return pgManageUsers();
  if(t==='staff_mgmt')    return pgStaffMgmt();
  if(t==='attendance')    return pgAttendance();
  if(t==='salary_sheet')  return pgSalarySheet();
  if(t==='custom_deds')   return pgCustomDeds();
  if(t==='custom_earnings') return pgCustomEarnings();
  if(t==='approvals')     return pgApprovals();
  if(t==='release')       return pgRelease();
  if(t==='approve_release')return pgApproveRelease();
  if(t==='all_slips')     return pgAllSlips();
  if(t==='my_home')       return pgMyHome();
  if(t==='my_slip')       return pgMySlip();
  if(t==='my_att')        return pgMyAtt();
  if(t==='my_leaves')     return pgMyLeaves();
  if(t==='leave_overview')return pgLeaveOverview();
  if(t==='data_archive'){
    if(!isAdminLike() || !canView('data_archive')) return `<div class="card"><div class="ct"><i class="ti ti-lock"></i> No Access</div>
      <div class="alert aw"><i class="ti ti-alert-triangle"></i> You don't have permission to access data archiving. Ask the main admin to grant it.</div></div>`;
    return pgDataArchive();
  }
  return '';
}

// ─── PAGES ────────────────────────────────────────────────────
function pgDashboard(){
  const m=APP.month,r=APP.user.role;
  const staff=getStaffOnly();
  const ap=apStatus(m);
  const relCount=staff.filter(s=>staffReleased(m,s.id)).length;
  const released=staff.length>0&&relCount===staff.length;
  const hasAtt=Object.keys(DB.attendance[m]||{}).length>0;
  const hasSheet=Object.keys(DB.salary_sheets[m]||{}).length>0;
  const payroll=staff.reduce((a,s)=>{const sl=calcSlip(s.id,m);return a+(sl?sl.net:0);},0);
  return `
  ${(()=>{
    const showAmt=(r==='director'||r==='admin'); // department net amounts are sensitive
    const secNet=sec=>staff.filter(s=>s.section===sec).reduce((a,s)=>{const sl=calcSlip(s.id,m);return a+(sl?sl.net:0);},0);
    const sc=(icon,color,val,label,small,sub)=>`<div class="stat">
      <div class="stat-ico" style="background:${color}22;color:${color}"><i class="ti ti-${icon}"></i></div>
      <div style="min-width:0;flex:1"><div class="sv" style="${small?'font-size:18px;':''}overflow-wrap:anywhere">${val}</div><div class="sl">${label}</div>${sub?`<div style="font-size:12px;font-weight:700;color:${color};margin-top:3px;overflow-wrap:anywhere">${sub}</div>`:''}</div>
    </div>`;
    const deptSub=sec=>showAmt?'Rs'+secNet(sec).toLocaleString():'';
    return `<div class="sg">
      ${sc('users','#60a5fa', staff.length, 'Total Staff')}
      ${sc('school','#34d399', staff.filter(s=>s.section==='School').length, 'School', false, deptSub('School'))}
      ${sc('building-skyscraper','#60a5fa', staff.filter(s=>s.section==='College').length, 'College', false, deptSub('College'))}
      ${sc('user-shield','#a78bfa', staff.filter(s=>s.section==='Admin').length, 'Admin', false, deptSub('Admin'))}
      ${sc('home','#f472b6', staff.filter(s=>s.section==='Domestic').length, 'Domestic', false, deptSub('Domestic'))}
      ${showAmt?sc('cash','#10b981', 'Rs'+payroll.toLocaleString(), 'Net Payroll', true):''}
    </div>`;
  })()}
  ${(()=>{
    const done=(hasAtt?1:0)+(hasSheet?1:0)+(ap.full?1:0)+(released?1:0);
    const pct=Math.round(done/4*100);
    const card=(icon,label,state,val,status)=>{
      const c=state==='done'?'#10b981':state==='active'?'#3b82f6':'var(--text4)';
      return `<div class="pipe-card" style="border-color:${c}55">
        <div class="pc-ico" style="background:${c}22;color:${c}"><i class="ti ti-${icon}"></i></div>
        <div class="pc-label">${label}</div>
        <div class="pc-val" style="color:${state==='pending'?'var(--text4)':'var(--text)'}">${val}</div>
        <div class="pc-status" style="background:${c}1f;color:${c}"><i class="ti ti-${state==='done'?'circle-check':state==='active'?'progress':'clock'}" style="font-size:11px"></i> ${status}</div>
      </div>`;
    };
    return `<div class="card">
      <div class="ct"><i class="ti ti-timeline"></i> ${m} — Salary Pipeline
        <span class="badge ${done===4?'bg':'by'}" style="margin-left:auto">${done}/4 stages</span>
      </div>
      <div class="pbar"><div style="width:${pct}%"></div></div>
      <div class="pipe">
        ${card('clipboard-check','Attendance', hasAtt?'done':'active', hasAtt?'Recorded':'Pending', hasAtt?'Complete':'Awaiting entry')}
        ${card('calculator','Salary Sheet', hasSheet?'done':(hasAtt?'active':'pending'), hasSheet?'Generated':'Pending', hasSheet?'Complete':'Not generated')}
        ${card('shield-check','Approvals', ap.full?'done':(ap.count>0?'active':'pending'), ap.count+'/'+APPROVER_LIST.length, ap.full?'All approved':(ap.count>0?'In progress':'Pending'))}
        ${card('cash','Released', released?'done':(relCount>0?'active':'pending'), relCount+'/'+staff.length, released?'All released':(relCount>0?'Partly released':'Not released'))}
      </div>
    </div>`;
  })()}
  ${(r==='director'||r==='admin')?(()=>{
    let byDir=0, byAdm=0;
    staff.forEach(s=>{
      if(!staffReleased(m,s.id)) return;
      byDir+=issuedBy(m,s.id,'Director'); // sums only the Director's segments
      byAdm+=issuedBy(m,s.id,'Admin');    // sums only the Admin's segments
    });
    const issued=byDir+byAdm;
    const remaining=Math.max(0,payroll-issued);
    const cell=(icon,color,label,val,note)=>`<div style="flex:1;min-width:160px;display:flex;align-items:center;gap:12px;padding:4px">
      <div class="stat-ico" style="width:42px;height:42px;font-size:20px;background:${color}22;color:${color}"><i class="ti ti-${icon}"></i></div>
      <div style="min-width:0"><div style="font-size:20px;font-weight:800;color:var(--text);line-height:1.1;overflow-wrap:anywhere">Rs${val.toLocaleString()}</div><div class="sl">${label}</div>${note?`<div class="tm" style="margin-top:2px">${note}</div>`:''}</div>
    </div>`;
    return `<div class="card">
      <div class="ct"><i class="ti ti-report-money"></i> Salary Disbursement — ${m}
        <span class="badge ${remaining===0&&issued>0?'bg':'by'}" style="margin-left:auto">${payroll?Math.round(issued/payroll*100):0}% issued</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:10px">
        ${cell('crown','#34d399','Issued by Director',byDir)}
        ${cell('user-shield','#60a5fa','Issued by Admin',byAdm)}
        ${cell('clock','#fb923c','Remaining',remaining,remaining>0?'Not yet issued':(issued>0?'Fully issued':'Nothing released yet'))}
      </div>
    </div>`;
  })():''}
  ${r==='admin'?adminDelegateCard():''}
  ${r.startsWith('approver_')?approverCard():''}
  ${r==='staff'?miniSlipCard():''}`;
}

function approverCard(){
  const m=APP.month,r=APP.user.role;
  const myAp=(DB.approvals[m]||{})[r];
  const hasSheet=Object.keys(DB.salary_sheets[m]||{}).length>0;
  return `<div class="card">
    <div class="ct"><i class="ti ti-check-circle"></i> My Approval — ${m}</div>
    ${myAp?`<div class="alert as"><i class="ti ti-check-circle"></i> Approved on ${myAp}</div>`:

}

function miniSlipCard(){
  const u=APP.user,m=APP.month;

    ${signed?`<div class="stamp"><i class="ti ti-check-circle"></i> Signed ${signed}</div>`:
    `<button class="btn bgr" style="margin-top:10px;width:100%" onclick="openSignPad('${u.id}','${m}')"><i class="ti ti-signature"></i> Sign Receipt</button>`}`:''}
  </div>`;
}
