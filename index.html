          ? (() => {
              const tot=calcTotalSecurityDeducted(s.id);
              const pct0=!(s.security_pct>0);
              if(pct0) return `<span class="badge bg" title="Prepaid security — no monthly deduction">Rs${tot.toLocaleString()} ✓ Done</span>`;
              const done=tot>=(s.salary||0);
              return `<span class="badge ${done?'bg':'by'}">${s.security_pct}%${done?' ✓ Done':''}</span>`;
            })()
          : (s.security_docs?`<span class="badge bb" title="Security documents submitted in lieu of a cash deduction"><i class="ti ti-file-check"></i> Docs</span>`:'—')}</td>
        <td style="font-weight:600;color:${secTotal>0?'#f87171':'var(--text4)'}">
          ${secTotal>0?`Rs${secTotal.toLocaleString()}`:'—'}
        </td>
        <td style="min-width:175px">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${ist?`<span class="badge ${ist.cls}">${ist.label}</span>`:'—'}
            ${ed&&ist&&ist.cls==='br'?`<button class="btn bgr bsm" style="padding:2px 6px;font-size:10px" title="Apply this increment — raise the salary and roll to next year" onclick="openModal('apply_increment','${s.id}')"><i class="ti ti-trending-up"></i> Apply</button>`:''}
            ${ed?`<span style="font-size:10px;color:${isManualIncr?'#a78bfa':'var(--text4)'}">${isManualIncr?'<i class="ti ti-pencil" style="font-size:9px"></i> Manual':'Auto'}</span>
            <button class="btn bou bsm" style="padding:2px 6px;font-size:10px" onclick="openModal('set_incr','${s.id}')"><i class="ti ti-calendar-event"></i> Set</button>`:''}
            ${ed&&s.last_increment?`<span class="badge bg" style="font-size:9px" title="Salary incremented to Rs${(s.last_increment.to||0).toLocaleString()} effective ${fmtMonthLabel(s.last_increment.month)} (from Rs${(s.last_increment.from||0).toLocaleString()})"><i class="ti ti-circle-check"></i> Applied ${fmtMonthLabel(s.last_increment.month)} · +${s.last_increment.type==='amt'?'Rs'+(s.last_increment.value||0).toLocaleString():(s.last_increment.value||0)+'%'}</span> <button class="btn bou bsm" style="padding:2px 5px;font-size:10px" title="Undo this increment" onclick="undoIncrementApplied('${s.id}')"><i class="ti ti-arrow-back-up"></i></button>`:''}
          </div>
        </td>
        <td style="white-space:nowrap"><button class="btn bou bsm" title="Account details" onclick="openModal('account_details','${s.id}')"><i class="ti ti-building-bank"></i> Account</button></td>
        ${ed?`<td style="white-space:nowrap">
          <button class="btn bou bsm" onclick="openModal('edit_staff','${s.id}')"><i class="ti ti-edit"></i></button>
          <button class="btn bou bsm" title="Grant admin privileges${hasAdminPrivs(s)?' (granted)':''}" onclick="openModal('staff_privs','${s.id}')"><i class="ti ti-shield-lock"${hasAdminPrivs(s)?' style="color:#34d399"':''}></i></button>
          <button class="btn brd bsm" onclick="deleteUser('${s.id}')"><i class="ti ti-trash"></i></button>
        </td>`:''}
      </tr>`;
        })];
    }).join('')}
    </tbody></table></div>
  </div>`;
}

// ATTENDANCE — admin: full edit. director: read-only summary.
function pgAttendance(){
  const m=APP.month;
  const att=DB.attendance[m]||{};
  const isDir=APP.user.role==='director';
  const staff=staffInMonth(m);               // drops anyone who left before this month
  const ed=canEdit('attendance');            // can edit attendance values
  const hasAtt=Object.keys(att).length>0;    // generated for this month?
  const mLabel=fmtMonthLabel(m);
  // Director can only browse months that have attendance; admin may go anywhere
  // (they need to open a fresh month to generate it).
  const attMax=isDir?lastAttMonth():'';

  // Attendance, like the salary sheet, must be explicitly generated for a month
  // before it can be filled in — opening a month no longer creates it.
  if(!hasAtt){
    return `<div class="card">
      <div class="ct"><i class="ti ti-calendar-stats"></i> Attendance${isDir?'':' Sheet'}
        ${monthPicker(m,{nav:true,max:attMax,style:'width:160px;margin-left:auto'})}
      </div>
      ${(!isDir&&ed)
        ?`<div class="alert ai"><i class="ti ti-info-circle"></i> Attendance for <b>${mLabel}</b> hasn't been generated yet. Generate it to start entering each staff member's lates, leaves and absences.</div>
          <button class="btn bgr" style="width:100%;padding:11px" onclick="genAttendance('${m}')"><i class="ti ti-calendar-plus"></i> Generate Attendance for ${mLabel}</button>`
        :`<div class="alert aw"><i class="ti ti-alert-triangle"></i> Attendance for ${mLabel} hasn't been generated yet.</div>`}
    </div>`;
  }

  if(isDir){
    return `<div class="card">
      <div class="ct"><i class="ti ti-calendar-stats"></i> Staff Attendance
        ${monthPicker(m,{nav:true,max:attMax,style:'width:160px;margin-left:auto'})}
      </div>
      ${searchBox('att-row','Search staff by name…')}
      <div style="overflow-x:auto">
      <table style="min-width:600px"><thead><tr>
        <th>Name</th><th>Sec</th><th>T.Late</th><th>Absent</th><th>Cas.L</th><th>Ann.L</th><th>Sick.L</th><th>Half.L</th><th>Deduction</th><th>Net Pay</th>
      </tr></thead><tbody>
      ${SECTIONS.flatMap(sec=>{
        const rows=staff.filter(s=>s.section===sec);
        if(!rows.length) return [];
        return [secHeaderRow(sec, 10),
          ...rows.map(s=>{
            const a=(att[s.id])||{};
            const sl=calcSlip(s.id,m);
            return `<tr class="att-row" data-search="${ds(s.name+' '+s.section+' '+s.designation)}">
              <td style="white-space:nowrap">${s.name}</td>
              <td><span class="sec-${s.section.toLowerCase()}">${s.section[0]}</span></td>
              <td>${a.t_late||0}</td><td>${a.absent||0}</td>
              <td>${a.casual_leave||0}</td><td>${a.annual_leave||0}</td><td>${a.sick_leave||0}</td><td>${a.hl||0}</td>
              <td style="color:#f87171">${sl?'-Rs'+sl.deduction.toLocaleString():'-'}</td>
              <td style="color:#34d399;font-weight:600">${sl?'Rs'+sl.net.toLocaleString():'-'}</td>
            </tr>`;
          })];
      }).join('')}
      </tbody></table></div>
    </div>`;
  }

  // Admin editable
  // Columns: Days | T.Late | Absent | Casual Leave | Annual Leave | Sick Leave | H.Leave
  // DL in salary sheet = max(0, T.Late-2)/4  (decimal days)
  // D.Lea = absent + casual_leave
  const cols =['days','t_late','absent','casual_leave','annual_leave','sick_leave','hl'];
  const hdrs =['Days','T.Late','Absent','Cas.L','Ann.L','Sick.L','Half.L'];
  return `<div class="card">
    <div class="ct"><i class="ti ti-calendar-stats"></i> Attendance Sheet
      ${monthPicker(m,{nav:true,max:attMax,style:'width:160px;margin-left:auto'})}
    </div>
    ${ed?'':'<div class="dir-note"><i class="ti ti-eye"></i> View-only access — you cannot change attendance.</div>'}
    ${ed?`<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn brd bsm" onclick="deleteAttendance('${m}')"><i class="ti ti-trash"></i> Delete Attendance</button></div>`:''}
    <div class="alert ai" style="margin-bottom:10px;font-size:11px">
      <i class="ti ti-info-circle"></i>
      <span><b>T.Late:</b> first 2 free, then every 4 = 1 day deducted (e.g. 8 lates → 8−2=6 → 6÷4=1.5 days) &nbsp;|&nbsp; <b>Half.L:</b> each = 0.5 day &nbsp;|&nbsp; <b>Absent+Cas.L</b> = D.Lea full days</span>
    </div>
    ${searchBox('att-row','Search staff by name…')}
    <div style="overflow-x:auto">
    <table style="min-width:700px"><thead><tr>
      <th>Name</th><th>Quota</th>${hdrs.map(h=>`<th>${h}</th>`).join('')}${ed?'<th></th>':''}
    </tr></thead><tbody>
    ${SECTIONS.flatMap(sec=>{
      const rows=staff.filter(s=>s.section===sec);
      if(!rows.length) return [];
      return [secHeaderRow(sec, 2+cols.length+(ed?1:0)),
        ...rows.map(s=>{
          const a=att[s.id]||{};
          const bal=getLeaveBalance(s.id,m.slice(0,4));
          const cleared=!!ATT_UNDO[m+'|'+s.id];
          const hasData=cols.some(c=>c!=='days'&&(a[c]||0)>0);
          return `<tr class="att-row" data-search="${ds(s.name+' '+s.section+' '+s.designation)}">
            <td style="white-space:nowrap">${s.name}</td>
            <td class="tm" style="white-space:nowrap">Ann:${bal.annualLeft} Sk:${bal.sickLeft}</td>
            ${cols.map(c=>{
              const val = c==='days' ? (a.days!=null ? a.days : daysInMonth(m)) : (a[c]||0);
              return `<td><input type="number" min="0" max="31" class="inp-sm" value="${val}" ${ed?'':'disabled'} onchange="saveAtt('${s.id}','${c}',this.value,'${m}')"></td>`;
            }).join('')}
            ${ed?`<td style="white-space:nowrap">${cleared
              ? `<button class="btn bou bsm" onclick="undoAtt('${s.id}','${m}')" title="Restore cleared entries"><i class="ti ti-arrow-back-up"></i> Undo</button>`
              : `<button class="btn brd bsm" onclick="clearAtt('${s.id}','${m}')" ${hasData?'':'disabled style="opacity:.4;cursor:default"'} title="Clear this row's entries"><i class="ti ti-eraser"></i> Clear</button>`}</td>`:''}
          </tr>`;
        })];
    }).join('')}
    </tbody></table></div>
  </div>`;
}

// SALARY SHEET
// Columns: Name | Section | Designation | Basic | DL (lates/2 days) | H.Leave | D.Lea (absent+cas) | Security | Net Pay
// Reusable columnar salary table (same layout admin sees), for a given staff list.
// opts.actionHeader (string) + opts.actionCell(staff, slip) add an extra column.
function salaryTableHTML(list, m, opts={}){
  const secs=SECTIONS.filter(sec=>list.some(s=>s.section===sec));
  const total=list.reduce((a,s)=>{const sl=calcSlip(s.id,m);return a+(sl?sl.net:0);},0);
  const temps=(DB.monthly_additions||{})[m]||[];
  const tempTotal=temps.reduce((a,t)=>a+(t.salary||0),0);
  const act=!!opts.actionCell;
  const detail=!opts.compact; // compact hides DL/H.L/D.Lea/Security/Custom columns
  // columns before "Net Pay": #,Name,Sec,Desig,Basic [+6 detail cols] + Sec.Refund + Total Ded
  const leadSpan=(detail?12:6)+1; // for the "Total Net Payroll" label colspan
  const span=(detail?14:8)+(act?1:0);
  return `${list.length>1?searchBox('sal-row','Search staff by name…'):''}<div style="overflow-x:auto">
    <table style="min-width:${act?(detail?920:600):(detail?780:480)}px"><thead><tr>
      <th>#</th><th>Name</th><th>Sec</th><th>Desig.</th>
      <th>Basic</th>
      ${detail?`<th title="Day Late: total lates minus 2 free">D.Late</th>
      <th title="Number of half leaves">Half.L</th>
      <th title="Day Leave: Absent + Casual Leave">D.Lea</th>
      <th>Security</th>
      <th>Custom Ded</th>
      <th style="color:#34d399">Custom Earn</th>`:''}
      <th>Total Ded.</th>
      <th>Net Pay</th>
      ${act?`<th>${opts.actionHeader||''}</th>`:''}
    </tr></thead><tbody>
    ${secs.flatMap((sec)=>{
      const rows=list.filter(s=>s.section===sec);
      if(!rows.length) return [];
      return [secHeaderRow(sec, span),
        ...rows.map((s,i)=>{
          const sl=calcSlip(s.id,m);
          if(!sl) return '';
          const rowStyle=opts.rowStyle?opts.rowStyle(s):'';
          return `<tr class="sal-row" data-search="${ds(s.name+' '+s.designation+' '+s.section)}" style="${rowStyle}">
            <td style="color:var(--text4)">${i+1}</td>
            <td style="white-space:nowrap">${s.name}</td>
            <td><span class="sec-${s.section.toLowerCase()}">${s.section[0]}</span></td>
            <td style="color:var(--text3)">${s.designation}</td>
            <td>Rs${sl.salary.toLocaleString()}</td>
            ${detail?`<td style="color:#fb923c">${sl.effectiveLates}</td>
            <td style="color:#fb923c">${sl.hlRaw}</td>
            <td style="color:#f87171">${sl.dleaDays}</td>
            <td style="color:#f87171">${sl.secDed>0?`-Rs${sl.secDed.toLocaleString()}${sl.secCompleted?' ✓':''}`:s.security?'<span class="badge bg" style="font-size:9px">Done</span>':'—'}</td>
            <td style="color:#f87171">${sl.cdTotal>0?'-Rs'+sl.cdTotal.toLocaleString():'—'}</td>
            <td style="color:#34d399">${sl.ceTotal>0?'+Rs'+sl.ceTotal.toLocaleString():'—'}</td>`:''}
            <td style="color:#f87171;font-weight:600">-Rs${sl.deduction.toLocaleString()}</td>
            <td style="color:#34d399;font-weight:700">Rs${sl.net.toLocaleString()}</td>
            ${act?`<td style="white-space:nowrap">${opts.actionCell(s,sl)}</td>`:''}
          </tr>`;
        })];
    }).join('')}
    ${temps.length?`<tr><td colspan="${span}" style="background:var(--surface);border-top:2px solid var(--border);padding:8px 10px;font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.5px"><i class="ti ti-user-plus" style="margin-right:4px"></i> One-Time / Temporary Staff</td></tr>
    ${temps.map((t,i)=>{
      const bankInfo=t.bank_name||t.account_title||t.account_no?`<span style="display:block;font-size:10px;font-weight:400;color:var(--text3);margin-top:2px">${[t.bank_name,t.account_title,t.account_no].filter(Boolean).join(' · ')}</span>`:'';
      return `<tr class="sal-row" data-search="${ds(t.name+' '+t.section)}">
        <td style="color:var(--text4)">${list.length+i+1}</td>
        <td style="white-space:nowrap;font-weight:600">${t.name}${bankInfo}</td>
        <td><span class="sec-${t.section.toLowerCase()}">${t.section[0]}</span></td>
        <td style="color:var(--text3);font-style:italic">${t.remarks||'One-time'}</td>
        <td>Rs${(t.salary||0).toLocaleString()}</td>
        ${detail?`<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>`:''}
        <td style="color:#f87171;font-weight:600">-Rs0</td>
        <td style="color:#34d399;font-weight:700">Rs${(t.salary||0).toLocaleString()}</td>
        ${act?`<td style="white-space:nowrap">${opts.actionCell(t,null)}</td>`:''}
      </tr>`;
    }).join('')}`:''}
    <tr style="background:var(--inset)">
      <td colspan="${leadSpan}" style="text-align:right;font-weight:700;color:var(--text);padding:10px">Total Net Payroll:</td>
      <td style="color:#34d399;font-weight:700">Rs${(total+tempTotal).toLocaleString()}</td>
      ${act?'<td></td>':''}
    </tr>
    </tbody></table></div>`;
}

// Card shown to admins listing salaries the Director delegated to them to release.
function adminDelegateCard(){
  if(APP.user.role!=='admin') return '';
  const m=APP.month, mLabel=fmtMonthLabel(m);
  const staff=staffInMonth(m).concat(DB.monthly_additions?.[m]||[]);
  const dmap=DB.release_delegations[m]||{};
  // Actionable: delegated AND still owes something (not released, or a top-up pending).
  const pending=staff.filter(s=>dmap[s.id]&&(!staffReleased(m,s.id)||releaseRemaining(m,s.id)>0));
  const pendIds=new Set(pending.map(s=>s.id));
  // Already handled by the admin (and nothing left to do here).
  const doneByAdmin=staff.filter(s=>(DB.release_by[m]||{})[s.id]==='Admin'&&!pendIds.has(s.id));
  if(!pending.length&&!doneByAdmin.length) return '';
  const row=(s)=>{
    const sl=calcSlip(s.id,m);
    const released=staffReleased(m,s.id);
    const rm=released?releaseRemaining(m,s.id):0;
    const delegated=!!dmap[s.id];
    let action;
    if(!released){
      action=`<button class="btn bou bsm" onclick="openModal('slip_detail','${s.id}|${m}')"><i class="ti ti-list-details"></i> Details</button> <button class="btn bgr bsm" onclick="releaseStaff('${m}','${s.id}')"><i class="ti ti-send"></i> Release</button> <button class="btn bou bsm" onclick="openPartialRelease('${m}','${s.id}')" title="Release part of the salary now"><i class="ti ti-coins"></i> Partial</button>`;
    } else if(rm>0&&delegated){
      action=`<span class="badge by" title="Salary revised after release"><i class="ti ti-alert-triangle"></i> Rs${rm.toLocaleString()} pending</span> <button class="btn bgr bsm" onclick="releaseTopUp('${m}','${s.id}')"><i class="ti ti-send"></i> Release remaining</button> <button class="btn bou bsm" onclick="openPartialRelease('${m}','${s.id}')" title="Release part of the remaining now"><i class="ti ti-coins"></i> Partial</button>`;
    } else {
      action=`<span class="badge bg"><i class="ti ti-check"></i> Released</span> <button class="btn bou bsm" onclick="undoReleaseAdmin('${m}','${s.id}')" title="Undo release"><i class="ti ti-arrow-back-up"></i></button>${rm>0?` <span class="badge by" title="Salary revised — ask the Director to delegate the top-up"><i class="ti ti-alert-triangle"></i> Rs${rm.toLocaleString()} pending</span>`:''}`;
    }
    return `<tr>
    <td style="white-space:nowrap">${s.name}</td>
    <td><span class="sec-${s.section.toLowerCase()}">${s.section[0]}</span></td>
    <td style="color:var(--text3)">${s.designation}</td>
    <td style="color:#34d399;font-weight:700">${sl?'Rs'+sl.net.toLocaleString():'—'}</td>
    <td style="white-space:nowrap">${action}</td>
  </tr>`;};
  return `<div class="card" style="border-color:#3b82f655">
    <div class="ct"><i class="ti ti-user-share" style="color:#60a5fa"></i> Salary release delegated to you — ${mLabel}
      <span class="badge ${pending.length?'by':'bg'}" style="margin-left:auto">${pending.length} pending</span>
    </div>
    <div class="alert ai" style="font-size:11px;margin-bottom:10px"><i class="ti ti-info-circle"></i> The Director asked you to release these salaries. Releasing here updates the status on the Director's side instantly.</div>
    <div style="overflow-x:auto"><table style="min-width:480px"><thead><tr><th>Name</th><th>Sec</th><th>Designation</th><th>Net Pay</th><th></th></tr></thead><tbody>
    ${pending.map(s=>row(s)).join('')}
    ${doneByAdmin.map(s=>row(s)).join('')}
    </tbody></table></div>
  </div>`;
}

    </div>
    <div class="frow" style="grid-template-columns:1.5fr 1.5fr 2fr;margin-top:0">
      <div><label class="lbl">Bank Name</label><input id="tmp_bank" class="inp" placeholder="e.g. HBL, Meezan"></div>
      <div><label class="lbl">Account Title</label><input id="tmp_acc_title" class="inp" placeholder="Account holder name"></div>
      <div><label class="lbl">Account No / IBAN</label><input id="tmp_acc_no" class="inp" placeholder="e.g. PK00 XXXX 0000 0000"></div>
    </div>
    ${temps.length?`<div style="overflow-x:auto"><table style="min-width:600px;margin-top:8px"><thead><tr><th>Name</th><th>Section</th><th>Salary</th><th>Remarks</th><th>Bank</th><th></th></tr></thead><tbody>
    ${temps.map(t=>`<tr>
      <td style="white-space:nowrap;font-weight:600">${t.name}</td>
      <td><span class="sec-${t.section.toLowerCase()}">${t.section}</span></td>
      <td style="font-weight:600">Rs${(t.salary||0).toLocaleString()}</td>
      <td style="color:var(--text3)">${t.remarks||'—'}</td>
      <td style="color:var(--text3);font-size:11px">${t.bank_name||t.account_title||t.account_no?`${[t.bank_name,t.account_title,t.account_no].filter(Boolean).join(' · ')}`:'—'}</td>
      <td><button class="btn brd bsm" onclick="removeTempStaff('${m}','${t.id}')"><i class="ti ti-trash"></i></button></td>

// CUSTOM DEDUCTIONS — admin only
function pgCustomDeds(){
  const m=APP.month;
  const ed=canEdit('custom_deds');
  // Keep the original index so edit/remove still point to the right entry.
  const rows=DB.custom_deds.map((d,i)=>({d,i})).filter(x=>x.d.month===m);
  const monthTotal=rows.reduce((a,x)=>a+(x.d.amount||0),0);

// APPROVALS — mobile-friendly stacked layout
function pgApprovals(){
  const m=APP.month,u=APP.user,r=u.role;
  const isDir=r==='director';
  // Only the director or a designated approver may use this page.
  if(!isDir && !isApprover(u.id)){
    return `<div class="card"><div class="ct"><i class="ti ti-shield-off"></i> Approvals</div>
      <div class="alert aw"><i class="ti ti-alert-triangle"></i> You are not assigned as an approver.</div></div>`;
  }
  const ap=apStatus(m);
  const hasSheet=Object.keys(DB.salary_sheets[m]||{}).length>0;
  return `<div class="card">
    <div class="ct"><i class="ti ti-shield-check"></i> Salary Approvals
      ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
    </div>
    ${isDir?`<div class="ov-note"><i class="ti ti-crown" style="flex-shrink:0"></i> As Director you can approve on behalf of any unavailable approver.</div>`:''}
    ${!hasSheet?'<div class="alert aw"><i class="ti ti-alert-triangle"></i> No salary sheet generated yet.</div>':''}
    ${(isDir?APPROVER_LIST:APPROVER_LIST.filter(apr=>approverStaffId(apr.key)===u.id)).map(apr=>{
      const done=(DB.approvals[m]||{})[apr.key];
      const assigned=approverStaff(apr.key);     // staff member designated for this slot
      const isMe=!isDir && assigned && assigned.id===u.id;
      const canApprove=hasSheet&&!done&&(isMe||isDir);
      return `<div class="arow">
        <i class="ti ti-${done?'check-circle':'circle'}" style="color:${done?'#34d399':'var(--text4)'};font-size:22px;flex-shrink:0"></i>
        <div class="arow-info">
          <div style="font-size:13px;color:var(--text);font-weight:600">${apr.label}
            ${isMe?'<span class="badge bs" style="margin-left:6px">You</span>':''}
          </div>
          <div class="tm">${assigned?`<i class="ti ti-user" style="font-size:10px"></i> ${assigned.name}`:'<span style="color:#f87171">Unassigned</span>'}
            ${done?` · ✓ Approved ${done}`:''}</div>
        </div>
        <div class="arow-action" style="display:flex;align-items:center;gap:6px">
          ${done?`<span class="badge bg">Approved</span>${isMe?`<button class="btn bou bsm" onclick="undoApprove('${m}','${apr.key}')"><i class="ti ti-arrow-back-up"></i> Undo</button>`:''}`:
            canApprove&&isMe?
              `<button class="btn bgr bsm" onclick="doApprove('${m}','${apr.key}')"><i class="ti ti-check"></i> Approve</button>`:
            `<span class="badge br">Pending</span>`}
        </div>
      </div>`;
    }).join('')}
    ${isDir&&ap.full?`<div class="alert as" style="margin-top:12px"><i class="ti ti-check-circle"></i> All ${APPROVER_LIST.length} approvals received. Ready for release.</div>`:''}
  </div>`;
}

// Status card listing staff whose salary has been incremented (latest increment
// per person), so the Director/Admin can see at a glance who got a raise.
function recentIncrementsCard(){
  const list=getStaffOnly().filter(s=>s.last_increment).sort((a,b)=> (b.last_increment.month||'').localeCompare(a.last_increment.month||''));
  if(!list.length) return '';
  const row=s=>{ const li=s.last_increment;
    return `<tr>
      <td style="white-space:nowrap">${s.name}<div class="tm" style="font-size:10px">${s.section} · ${s.designation}</div></td>
      <td>${fmtMonthLabel(li.month)}</td>
      <td>${li.type==='amt'?'+Rs'+(li.value||0).toLocaleString():'+'+(li.value||0)+'%'}</td>
      <td class="tm">Rs${(li.from||0).toLocaleString()} → <b style="color:#34d399">Rs${(li.to||0).toLocaleString()}</b></td>
      <td class="tm" style="white-space:nowrap">${li.by||'—'} · ${li.date||''}</td>
    </tr>`;
  };
  return `<div class="card" style="border-color:#10b98155">
    <div class="ct"><i class="ti ti-trending-up" style="color:#34d399"></i> Salary Increments Applied</div>
    <div class="alert ai" style="font-size:11px"><i class="ti ti-info-circle"></i> Staff whose salary has been incremented. The raise applies from the effective month onward; earlier months keep their old salary.</div>
    <div style="overflow-x:auto"><table style="min-width:560px"><thead><tr>
      <th>Staff</th><th>Effective</th><th>Increment</th><th>Salary</th><th>By</th>
    </tr></thead><tbody>
    ${list.map(row).join('')}
    </tbody></table></div>
  </div>`;
}

function pgRelease(){

    <div class="ct"><i class="ti ti-cash"></i> Release Salary — ${m}</div>
    ${!ap.full&&!rel.released?`<div class="alert aw"><i class="ti ti-alert-triangle"></i> ${ap.count}/${APPROVER_LIST.length} approvals. Missing: ${APPROVER_LIST.filter(a=>!slotComplete(m,a.key)).map(a=>a.label).join(', ')}</div>`:''}
    ${ap.full&&!rel.released?`<div class="alert as"><i class="ti ti-check-circle"></i> All approved! Ready to release.</div>
    <button class="btn bgr" style="margin-bottom:14px;width:100%" onclick="releaseSal('${m}')"><i class="ti ti-send"></i> Release Salary for ${m}</button>`:''}
    ${rel.released?`<div class="alert as"><i class="ti ti-check-circle"></i> RELEASED on ${rel.date}</div>
    <div class="div"></div>

      <td>${sg?`<span class="badge bg">Signed ${sg}</span>`:'<span class="badge by">Pending</span>'}</td></tr>`;
    }).join('')}</tbody></table>`:''}
  </div>`;
}

// MERGED Approve + Release page (Director): approver status cards at top, full
// salary sheet with per-person status/remarks/release in the middle.
function pgApproveRelease(){
  const m=APP.month;
  // Salary can't be approved/released for a month the admin hasn't generated yet.
  if(!sheetGenerated(m)){
    return `<div class="card">
      <div class="ct"><i class="ti ti-shield-check"></i> Salary Approval &amp; Release
        ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
      </div>
      <div class="alert aw" style="margin-bottom:0"><i class="ti ti-alert-triangle"></i> The salary sheet for <b>${fmtMonthLabel(m)}</b> hasn't been generated yet. Once the admin generates it, approvals and release will appear here.</div>
    </div>`;
  }
  const ap=apStatus(m);
  const staff=staffInMonth(m);
  const relMap=DB.staff_releases[m]||{};
  const relCount=staff.filter(s=>relMap[s.id]).length;
  const approvedUnreleased=staff.filter(s=>{const a=staffApproval(m,s.id);return a&&a.status==='approved'&&!relMap[s.id];}).length;

  // Per-person status + remarks + release control
  const isLastMonth = s => hasLeft(s) && s.left_month === m;
  const dirActionCell=(s)=>{
    const a=staffApproval(m,s.id);
    const rel=!!relMap[s.id];
    const meta=apprMeta(a&&a.status);
    const disp=a&&a.status==='disapproved';
    const cond=a&&a.status==='conditional';
    const delegated=!!(DB.release_delegations[m]||{})[s.id];
    const by=(DB.release_by[m]||{})[s.id];
    return `<span class="badge ${meta.cls}" title="${meta.label}"><i class="ti ti-${meta.icon}"></i></span>
      ${hasLeft(s)?`<span class="badge bx" title="${isLastMonth(s)?'This is their LAST month — they have left':'Left since '+fmtMonthLabel(s.left_month)}"><i class="ti ti-logout"></i> Left${isLastMonth(s)?' (Last month)':''}</span>`:''}
      ${s.remarks?`<button class="btn bou bsm" onclick="openModal('staff_remark','${s.id}')"><i class="ti ti-message-2"></i> Remarks</button>`:''}
      ${(a&&a.remarks)?`<button class="btn bou bsm" style="border-color:${meta.color}88;color:${meta.color}" onclick="openModal('view_remark','${s.id}')"><i class="ti ti-message-2"></i> Appr. Remarks</button>`:''}
      <button class="btn bou bsm" title="Account details" onclick="openModal('account_details','${s.id}')"><i class="ti ti-building-bank"></i> Account</button>
      <button class="btn bou bsm" onclick="openModal('slip_detail','${s.id}|${m}')"><i class="ti ti-list-details"></i> Details</button>
      ${rel
        ? (()=>{
            const undoBtn=by==='Admin'?'':` <button class="btn bou bsm" onclick="unreleaseStaff('${m}','${s.id}')" title="Undo release"><i class="ti ti-arrow-back-up"></i></button>`;
            const rm=releaseRemaining(m,s.id);
            let topup='';
            if(rm>0){
              const dl=!!(DB.release_delegations[m]||{})[s.id];
              topup=` <span class="badge by" title="Salary revised after release — Rs${releasedAmount(m,s.id).toLocaleString()} of Rs${calcSlip(s.id,m).net.toLocaleString()} released"><i class="ti ti-alert-triangle"></i> Rs${rm.toLocaleString()} pending</span> <button class="btn bgr bsm" onclick="releaseTopUp('${m}','${s.id}')"><i class="ti ti-send"></i> Release remaining</button> <button class="btn bou bsm" onclick="openPartialRelease('${m}','${s.id}')" title="Release part of the remaining now"><i class="ti ti-coins"></i> Partial</button> ${dl
                ? `<span class="badge bb" title="Waiting for Admin to release the remaining"><i class="ti ti-user-share"></i> Admin</span> <button class="btn bou bsm" onclick="undelegateRelease('${m}','${s.id}')" title="Take back from Admin"><i class="ti ti-arrow-back-up"></i></button>`
                : `<button class="btn bou bsm" onclick="delegateRelease('${m}','${s.id}')" title="Let Admin release the remaining"><i class="ti ti-user-share"></i> Delegate</button>`}`;
            }
            const dirAmt=issuedBy(m,s.id,'Director'), admAmt=issuedBy(m,s.id,'Admin');
            const mixed=dirAmt>0&&admAmt>0;
            const relLabel=mixed?'Released (split)':('Released'+(by==='Admin'?' by Admin':''));
            const relTitle=mixed?`Director: Rs${dirAmt.toLocaleString()} · Admin: Rs${admAmt.toLocaleString()}`:'';
            return `<span class="badge bg" title="${relTitle}"><i class="ti ti-check"></i> ${relLabel}</span>${undoBtn}${topup}`;
          })()
        : `<button class="btn ${disp?'brd':'bgr'} bsm" style="${cond?'background:#d97706;color:#fff':''}" onclick="releaseStaff('${m}','${s.id}')"><i class="ti ti-send"></i> Release</button>
           <button class="btn bou bsm" onclick="openPartialRelease('${m}','${s.id}')" title="Release part of the salary now"><i class="ti ti-coins"></i> Partial</button>
           ${delegated
             ? `<span class="badge bb" title="Waiting for Admin to release"><i class="ti ti-user-share"></i> Admin</span> <button class="btn bou bsm" onclick="undelegateRelease('${m}','${s.id}')" title="Take back from Admin"><i class="ti ti-arrow-back-up"></i></button>`
             : `<button class="btn bou bsm" onclick="delegateRelease('${m}','${s.id}')" title="Let Admin release this salary"><i class="ti ti-user-share"></i> Delegate</button>`}`}`;
  };

  return recentIncrementsCard()+`<div class="card">
    <div class="ct"><i class="ti ti-shield-check"></i> Salary Approval &amp; Release
      ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
    </div>
    <div class="ov-note"><i class="ti ti-crown" style="flex-shrink:0"></i> Each approver reviews their section. Releasing a person's salary individually overrides any pending approval for that person.</div>
    ${(()=>{const ch=staff.filter(s=>releaseRemaining(m,s.id)>0);const sum=ch.reduce((a,s)=>a+releaseRemaining(m,s.id),0);return ch.length?`<div class="alert aw"><i class="ti ti-alert-triangle"></i> <span>Salary revised after release for <b>${ch.length}</b> staff — <b>Rs${sum.toLocaleString()}</b> still to be released: ${ch.map(s=>s.name+' (Rs'+releaseRemaining(m,s.id).toLocaleString()+')').join(', ')}. Use <b>Release remaining</b> in the table below.</span></div>`:'';})()}
    ${(()=>{const lv=staff.filter(s=>hasLeft(s)&&s.left_month===m);return lv.length?`<div style="background:var(--surface2);border:1px solid #a78bfa55;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:6px;color:#a78bfa;font-size:12px;font-weight:700"><i class="ti ti-logout"></i> Left this month</span>
      ${lv.map(s=>`<span class="badge bx" style="font-size:10px;padding:4px 10px"><i class="ti ti-user"></i> ${s.name} <span style="color:var(--text4)">·</span> ${s.section}</span>`).join('')}
    </div>`:'';})()}
    ${(()=>{
      const cds=DB.custom_deds.filter(d=>d.month===m);
      const ces=(DB.custom_earnings||[]).filter(e=>e.month===m);
      if(!cds.length&&!ces.length) return '';
      const staffName=sid=>{const s=DB.staff_users.find(x=>x.id===sid);return s?s.name:sid;};
      const chip=(label,amt,who,color)=>`<span class="badge" style="font-size:10px;padding:4px 10px;background:${color}22;color:${color};border:1px solid ${color}44">${label}${who?` <span style="opacity:.7">·</span> ${who}`:''} <span style="opacity:.7">·</span> Rs${amt.toLocaleString()}</span>`;
      const rows=[];
      if(cds.length) rows.push(`<span style="display:flex;align-items:center;gap:6px;color:#f87171;font-size:12px;font-weight:700"><i class="ti ti-receipt-off"></i> Deductions</span>`+
        cds.map(d=>chip(d.label,d.amount,d.global?'All staff':staffName(d.staffId),'#f87171')).join(''));
      if(ces.length) rows.push(`<span style="display:flex;align-items:center;gap:6px;color:#34d399;font-size:12px;font-weight:700"><i class="ti ti-cash"></i> Earnings</span>`+
        ces.map(e=>chip(e.label,e.amount,e.global?'All staff':staffName(e.staffId),'#34d399')).join(''));
      return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">${rows.join('<span style="width:1px;height:20px;background:var(--border);margin:0 2px"></span>')}</div>`;
    })()}
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="flex:1;background:var(--inset);border-radius:6px;height:8px;overflow:hidden">
        <div style="height:8px;border-radius:6px;width:${Math.round(ap.count/APPROVER_LIST.length*100)}%;background:${ap.full?'#059669':'#3b82f6'};transition:width .3s"></div>
      </div>
      <span class="badge ${ap.full?'bg':'by'}">${ap.count}/${APPROVER_LIST.length} approvers done</span>
    </div>
    <div class="appr-grid">
    ${APPROVER_LIST.map(apr=>{
      const assigned=approverStaff(apr.key);
      const sstaff=slotStaff(apr.key, m);
      const appr=sstaff.filter(s=>{const a=staffApprovalBy(m,s.id,apr.key);return a&&a.status==='approved';}).length;
      const disp=sstaff.filter(s=>{const a=staffApprovalBy(m,s.id,apr.key);return a&&a.status==='disapproved';}).length;
      const cond=sstaff.filter(s=>{const a=staffApprovalBy(m,s.id,apr.key);return a&&a.status==='conditional';}).length;
      const overridden=!!(DB.approvals[m]||{})[apr.key];
      const complete=slotComplete(m,apr.key);
      const hasDisp=disp>0, hasCond=cond>0;
      const dot=complete?(hasDisp?'#f87171':(hasCond?'#fbbf24':'#34d399')):'#fbbf24';
      const stBadge=complete?(overridden?['bx','Overridden']:(hasDisp?['br','Issues']:(hasCond?['by','Conditional']:['bg','Approved']))):['by','Pending'];
      return `<div class="appr-card" style="border-left:3px solid ${dot}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:11px;height:11px;border-radius:50%;background:${dot};box-shadow:0 0 8px ${dot}aa;flex-shrink:0"></span>
          <div style="font-weight:600;color:var(--text);font-size:13px">${apr.label}</div>
          <span class="badge ${stBadge[0]}" style="margin-left:auto">${stBadge[1]}</span>
        </div>
        <div class="tm" style="margin:6px 0">${assigned?`<i class="ti ti-user" style="font-size:10px"></i> ${assigned.name}`:'<span style="color:#f87171">Unassigned</span>'}</div>
        <div style="font-size:11px;color:var(--text3)">
          <span style="color:#34d399">✓ ${appr}</span> &nbsp; <span style="color:#fbbf24">◑ ${cond}</span> &nbsp; <span style="color:#f87171">✗ ${disp}</span> &nbsp; <span>of ${sstaff.length}</span>
        </div>
        <div style="margin-top:8px">
          ${complete
            ? `<span class="tm"><i class="ti ti-check"></i> Review complete</span>`
            : `<span class="tm"><i class="ti ti-clock"></i> Awaiting review</span>`}
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>

  <div class="card">
    <div class="ct"><i class="ti ti-calculator"></i> Salary Sheet — ${m}
      <span class="badge ${relCount===staff.length&&staff.length?'bg':'by'}" style="margin-left:auto">${relCount}/${staff.length} released</span>
    </div>
    ${staff.length?salaryTableHTML(staff,m,{compact:true,actionHeader:'Status / Release',actionCell:dirActionCell,rowStyle:(s)=>{const t=rowTint(m,s);return t+(hasLeft(s)?(t?';':'')+'opacity:.7':'');}}):'<p class="tm">No staff records.</p>'}
    ${staff.length?`<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">
      ${relCount>0?`<button class="btn bou" style="padding:10px 22px" onclick="unreleaseAll('${m}')"><i class="ti ti-arrow-back-up"></i> Undo all (${relCount})</button>`:''}
      ${approvedUnreleased>0?`<button class="btn bgr" style="padding:10px 22px" onclick="releaseAllApproved('${m}')"><i class="ti ti-send"></i> Release all approved (${approvedUnreleased})</button>`:''}
    </div>`:''}
  </div>`;
}

function pgAllSlips(){
  const m=APP.month,u=APP.user;
  const isSectionScoped=u.role==='staff'; // approver staff review only their section(s)
  // Nothing to approve/confirm for a month whose salary sheet isn't generated yet.
  if(!sheetGenerated(m)){
    return `<div class="card">
      <div class="ct"><i class="ti ${isSectionScoped?'ti-file-invoice':'ti-checkbox'}"></i> ${isSectionScoped?'Salary Approval':'Salary Receiving Confirmation'}
        ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
      </div>
      <div class="alert aw" style="margin-bottom:0"><i class="ti ti-alert-triangle"></i> The salary sheet for <b>${fmtMonthLabel(m)}</b> hasn't been generated yet.</div>
    </div>`;
  }
  const allowed=visibleSectionsFor(u);
  const list=getStaffOnly().filter(s=>allowed.includes(s.section) && activeInMonth(s, m));
  const reviewed=list.filter(s=>myApproverDecision(m,s.id)).length;
  // Per-row decision dropdown: Approve / Disapprove / Conditional (last two need a remark).
  // Shows THIS approver's own decision, plus chips for any OTHER approver (e.g. the
  // Admin Head) who covers the same person — so each approver still reviews independently.
  const otherChips=(s)=>{
    const myKeys=actingApproverKeys(u.id, s.id);
    return coveringSlots(s.id).filter(slot=>!myKeys.includes(slot.key)).map(slot=>{
      const d=staffApprovalBy(m,s.id,slot.key); const mt=apprMeta(d&&d.status);
      return `<span class="badge ${d?mt.cls:'bx'}" style="margin-left:3px" title="${slot.label}: ${d?mt.label:'Pending'}"><i class="ti ti-${d?mt.icon:'clock'}"></i> ${slot.label}</span>`;
    }).join('');
  };
  const actionCell=(s)=>{
    const a=myApproverDecision(m,s.id);
    const status=a?a.status:'';
    const meta=apprMeta(status);
    const leftBadge=hasLeft(s)?`<span class="badge bx" style="margin-left:2px" title="${s.left_month===m?'Last month — staff has left':'Left since '+fmtMonthLabel(s.left_month)}"><i class="ti ti-logout"></i></span>`:'';
    if(staffReleased(m,s.id)){
      return `${leftBadge}<span class="badge bg" style="padding:6px 12px"><i class="ti ti-lock"></i> Salary Released</span>${otherChips(s)}`;
    }
    return `${leftBadge}<select class="inp" style="width:auto;min-width:140px;display:inline-block;padding:5px 8px;${a?'border-color:'+meta.color+'66':''}" onchange="decideStaff('${m}','${s.id}',this.value)">
        <option value=""${!a?' selected':''}>— Set decision —</option>
        <option value="approved"${status==='approved'?' selected':''}>✓ Approve</option>
        <option value="disapproved"${status==='disapproved'?' selected':''}>✗ Disapprove</option>
        <option value="conditional"${status==='conditional'?' selected':''}>◑ Conditional</option>
      </select>
      ${a&&a.remarks?`<button class="btn bou bsm" onclick="openModal('view_remark','${s.id}')" title="View remark"><i class="ti ti-message-2"></i></button>`:''}
      ${a?`<span class="badge ${meta.cls}" style="margin-left:2px"><i class="ti ti-${meta.icon}"></i> ${meta.label}</span>`:''}${otherChips(s)}`;
  };
  const leftRowStyle=(s)=>{const t=rowTint(m,s);return t+(hasLeft(s)?(t?';':'')+'opacity:.7':'');};
  if(isSectionScoped){
    return `<div class="card">
      <div class="ct"><i class="ti ti-file-invoice"></i> ${allowed.join(' & ')+' — Salary Approval'}
        ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
      </div>
      <div class="alert ai"><i class="ti ti-info-circle"></i> Approve or disapprove each staff member's salary. Disapproving requires a remark for the Director. &nbsp;<b>${reviewed}/${list.length} reviewed.</b></div>
      ${(()=>{const lv=list.filter(s=>hasLeft(s)&&s.left_month===m);return lv.length?`<div style="background:var(--surface2);border:1px solid #a78bfa55;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:6px;color:#a78bfa;font-size:12px;font-weight:700"><i class="ti ti-logout"></i> Left this month</span>
        ${lv.map(s=>`<span class="badge bx" style="font-size:10px;padding:4px 10px"><i class="ti ti-user"></i> ${s.name} <span style="color:var(--text4)">·</span> ${s.section}</span>`).join('')}
      </div>`:'';})()}
      ${list.length===0?'<p class="tm">No staff in your section for this view.</p>':
        salaryTableHTML(list,m,{actionHeader:'Decision',actionCell,rowStyle:leftRowStyle})}
      ${(list.length&&reviewed<list.length)?`<div style="display:flex;justify-content:flex-end;margin-top:14px">
        <button class="btn bou" onclick="approveAllRemaining('${m}')"><i class="ti ti-checks"></i> Approve all remaining (${list.length-reviewed})</button>
      </div>`:''}
    </div>`;
  }
  // Director "Confirmation" view: shows whether each staff member has confirmed
  // (signed) receiving their salary. Confirmation is only possible once released.
  const confirmCell=(s)=>{
    const released=staffReleased(m,s.id);
    const rec=released?getReceipt(m,s.id):null;
    if(!released) return '<span class="badge bx"><i class="ti ti-clock"></i> Not released</span>';
    if(rec)       return `<span class="badge bg"><i class="ti ti-circle-check"></i> Confirmed · ${rec.date}</span>${rec.hasSig?` <button class="btn bou bsm" onclick="openSigView('${s.id}','${m}')" title="View signature"><i class="ti ti-signature"></i></button>`:''}`;
    return '<span class="badge by"><i class="ti ti-hourglass-high"></i> Awaiting confirmation</span>';
  };
  const releasedList=list.filter(s=>staffReleased(m,s.id));
  const confirmedCount=releasedList.filter(s=>(DB.receipts[m]||{})[s.id]).length;
  return `<div class="card">
    <div class="ct"><i class="ti ti-checkbox"></i> Salary Receiving Confirmation
      ${monthPicker(m,{nav:true,max:lastSheetMonth(),style:'width:160px;margin-left:auto'})}
    </div>
    <div class="alert ai"><i class="ti ti-info-circle"></i> Shows which staff have signed to confirm they received their salary. Staff can confirm only after their salary is released. &nbsp;<b>${confirmedCount}/${releasedList.length} confirmed${releasedList.length<list.length?` (of ${releasedList.length} released)`:''}.</b></div>
    ${list.length===0?'<p class="tm">No staff records for this month.</p>':
      salaryTableHTML(list,m,{compact:true,actionHeader:'Receiving',actionCell:confirmCell})}
  </div>`;
}

// STAFF DASHBOARD — a single overview of everything that matters to the staff member:
// this month's salary + status, security-deposit progress, employment/account details,
// leave balance, attendance and a year-to-date earnings summary.
function pgMyHome(){
  const u=APP.user, m=APP.month, year=m.slice(0,4);
  const st=DB.staff_users.find(s=>s.id===u.id)||u;
  const nowM=new Date().toISOString().slice(0,7);
  const availMax=lastAvailableMonth(u.id); // latest month the admin has processed
  const pickMax=availMax||nowM;            // cap the pickers here — nothing beyond exists
  const slReady=salaryReady(u.id,m);       // is THIS month's salary generated or released?

  // This month's salary — only exists once the admin has generated/released it
  // (salary runs in arrears, so the current month isn't ready until processed).
  const sl=slReady?calcSlip(u.id,m):null;
  const released=staffReleased(m,u.id);
  // Never show more than the net as "released" — if the salary was revised down after
  // release, the displayed released amount tracks the current net, not the stale snapshot.
  const relAmt=released?Math.min(releasedAmount(m,u.id), sl?sl.net:0):0;
  const pend=sl?Math.max(0,sl.net-relAmt):0;
  const signed=released?receiptDate(m,u.id):null;

  // Security deposit progress (cap = 1× current basic salary)
  const secOn=!!st.security;
  const secDocs=!!st.security_docs;                     // security documents submitted (can co-exist with a cash deposit)
  const prepaid=secOn && !(st.security_pct>0);          // fixed/prepaid security
  const secTarget=st.salary||0;
  const secDeducted=calcTotalSecurityDeducted(u.id);
  const secRemaining=prepaid?0:Math.max(0,secTarget-secDeducted);
  const secPctDone=prepaid?100:(secTarget>0?Math.min(100,Math.round(secDeducted/secTarget*100)):0);
  const secDone=secOn && secRemaining<=0;

  // Leave balance + this-month attendance
  const bal=getLeaveBalance(u.id,year);
  const att=((DB.attendance[m]||{})[u.id])||{};
  const attEmpty=!Object.keys(att).length;
  const workingDays=att.days||daysInMonth(m);

  // Year-to-date earnings (only months with a generated salary sheet)
  let yearNet=0,yearDed=0,yearSec=0,monthsProcessed=0;
  Object.keys(DB.salary_sheets||{}).filter(mm=>mm.startsWith(year+'-')&&(DB.salary_sheets[mm]||{})[u.id]).sort().forEach(mm=>{
    const s=calcSlip(u.id,mm); if(!s) return;
    yearNet+=s.net; yearDed+=s.deduction; yearSec+=s.secDed; monthsProcessed++;
  });

  // Next increment
  const incrDate=getNextIncrementDate(st);
  const incrS=incrStatus(incrDate);
  const incrBadge=(incrS&&incrS.cls!=='bx')?` <span class="badge ${incrS.cls}">${incrS.label}</span>`:'';

  const hasAcc=st.bank_name||st.account_no||st.account_title;

  const kpi=(icon,color,val,label,sub,subColor,onclick)=>`<div class="stat"${onclick?` onclick="${onclick}" style="cursor:pointer" title="Tap for the month-wise breakdown"`:''}>
    <div class="stat-ico" style="background:${color}22;color:${color}"><i class="ti ti-${icon}"></i></div>
    <div style="min-width:0;flex:1"><div class="sv" style="font-size:22px;overflow-wrap:anywhere">${val}${onclick?' <i class="ti ti-chevron-right" style="font-size:13px;color:var(--text3);vertical-align:middle"></i>':''}</div><div class="sl">${label}</div>${sub?`<div style="font-size:11px;color:${subColor||color};font-weight:700;margin-top:3px">${sub}</div>`:''}</div>
  </div>`;

  return `
  <div style="margin-bottom:18px">
    <div style="font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px"><i class="ti ti-hand-stop" style="color:#fbbf24"></i> Welcome, ${st.name}</div>
    <div class="tm" style="margin-top:4px">${st.designation} · ${st.section} — here's your overview for ${fmtMonthLabel(m)}.</div>
  </div>

  <div class="sg">
    ${kpi('cash','#10b981', sl?'Rs'+sl.net.toLocaleString():'—', 'Net Salary — '+m, sl?(released?'Released':'Pending'):'Not generated', sl&&released?'#34d399':'#fb923c')}
    ${kpi('shield-lock', (secDone||(secDocs&&!secOn))?'#34d399':'#60a5fa', secOn?(secDone?'Done':secPctDone+'%'):(secDocs?'Docs':'N/A'), 'Security Deposit', (()=>{const p=[];if(secOn)p.push(secDone?(secDocs?'Paid':'Fully paid'):'Rs'+secRemaining.toLocaleString()+' left');if(secDocs)p.push('Docs submitted');return p.length?p.join(' · '):'Not applicable';})(), (secDone||(secDocs&&!secOn))?'#34d399':'#fb923c')}
    ${kpi('calendar-check','#a78bfa', bal.annualLeft, 'Annual Leave Left', bal.annualUsed+' used / '+bal.annualMax)}
    ${kpi('coins','#fbbf24', 'Rs'+yearNet.toLocaleString(), 'Earned in '+year, monthsProcessed+' month'+(monthsProcessed===1?'':'s'), '#fbbf24', "openModal('year_breakdown','"+u.id+"|"+year+"')")}
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,330px),1fr));gap:16px;align-items:stretch">

    <div class="card" style="margin-bottom:0;display:flex;flex-direction:column">
      <div class="ct"><i class="ti ti-cash"></i> This Month — ${fmtMonthLabel(m)}
        ${monthPicker(m,{nav:true,max:pickMax,style:'width:150px;margin-left:auto'})}
      </div>
      ${sl?`
        <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:12px">
          <div style="font-size:30px;font-weight:800;color:#34d399;line-height:1">Rs${sl.net.toLocaleString()}</div>
          <div style="margin-bottom:4px">${released?`<span class="badge bg"><i class="ti ti-circle-check"></i> Released</span>`:`<span class="badge by"><i class="ti ti-clock"></i> Pending</span>`}</div>
        </div>
        <div class="sr"><span style="color:var(--text2)">Basic Salary</span><span>Rs${sl.salary.toLocaleString()}</span></div>
        <div class="sr"><span style="color:var(--text2)">Total Deductions</span><span class="dd">-Rs${sl.deduction.toLocaleString()}</span></div>
        <div class="sr"><span style="color:var(--text2)">Net Salary</span><span style="font-weight:700">Rs${sl.net.toLocaleString()}</span></div>
        ${released?`<div class="sr"><span style="color:#34d399">Amount Released</span><span style="color:#34d399;font-weight:700">Rs${relAmt.toLocaleString()}</span></div>${pend>0?`<div class="tm" style="color:#fb923c;padding:4px 0"><i class="ti ti-clock"></i> Rs${pend.toLocaleString()} still pending</div>`:''}`:''}
        ${signed?`<div style="margin-top:8px"><span class="badge bg"><i class="ti ti-signature"></i> Receipt signed ${signed}</span></div>`:''}
        <div style="display:flex;gap:8px;margin-top:auto;padding-top:14px">
          <button class="btn ${released&&!signed?'bgr':'bou'}" style="flex:1;padding:11px" onclick="openModal('view_slip','${u.id}|${m}')"><i class="ti ti-file-invoice"></i> ${released&&!signed?'View &amp; Sign Slip':'View Salary Slip'}</button>
          <button class="btn bou" style="padding:11px" title="Download PDF" onclick="downloadMySlip('${m}','${u.id}')"><i class="ti ti-download"></i> PDF</button>
        </div>
      `:`<div class="alert aw" style="margin-bottom:0"><i class="ti ti-calendar-off"></i> Salary for ${fmtMonthLabel(m)} hasn't been generated yet — it'll appear here once the admin processes it.</div>`}
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="ct"><i class="ti ti-shield-lock"></i> Security Deposit</div>
      ${!secOn?(secDocs?`
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px">
          <div><div style="font-size:22px;font-weight:800;color:#34d399"><i class="ti ti-file-check"></i> Documents Submitted</div><div class="tm">in lieu of a cash security deposit</div></div>
          <span class="badge bb"><i class="ti ti-circle-check"></i> On file</span>
        </div>
        <div class="sr"><span style="color:var(--text2)">Monthly deduction</span><span style="color:#34d399">None</span></div>
        <div class="tm" style="margin-top:8px"><i class="ti ti-info-circle"></i> You submitted security documents — nothing is deducted from your monthly salary.</div>
       `:`<div class="alert ai" style="margin-bottom:0"><i class="ti ti-info-circle"></i> No security deposit applies to your salary.</div>`):
       prepaid?`
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px">
          <div><div style="font-size:26px;font-weight:800;color:#34d399">Rs${(st.security_paid||0).toLocaleString()}</div><div class="tm">security deposit on file</div></div>
          <span class="badge bg"><i class="ti ti-circle-check"></i> ${secDocs?'Paid':'Completed'}</span>
        </div>
        <div class="pbar" style="margin:6px 0 14px"><div style="width:100%"></div></div>
        <div class="sr"><span style="color:var(--text2)">Security deposit</span><span>Rs${(st.security_paid||0).toLocaleString()}</span></div>
        <div class="sr"><span style="color:var(--text2)">Monthly deduction</span><span style="color:#34d399">None</span></div>
        ${secDocs?`<div class="sr"><span style="color:var(--text2)">Security documents</span><span class="badge bb"><i class="ti ti-file-check"></i> Submitted</span></div>`:''}
        <div class="tm" style="margin-top:8px"><i class="ti ti-info-circle"></i> ${secDocs?'Security amount paid and documents submitted — nothing is deducted from your monthly salary.':'Security is fully secured — nothing is deducted from your monthly salary.'}</div>
       `:`
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px">
          <div><div style="font-size:26px;font-weight:800;color:${secDone?'#34d399':'#60a5fa'}">${secPctDone}%</div><div class="tm">deducted of 1× salary</div></div>
          ${secDone?`<span class="badge bg"><i class="ti ti-circle-check"></i> Completed</span>`:`<span class="badge by"><i class="ti ti-progress"></i> In progress</span>`}
        </div>
        <div class="pbar" style="margin:6px 0 14px"><div style="width:${secPctDone}%"></div></div>
        <div class="sr"><span style="color:var(--text2)">Total Security (1× salary)</span><span>Rs${secTarget.toLocaleString()}</span></div>
        <div class="sr"><span style="color:var(--text2)">Deducted so far</span><span style="color:#34d399">Rs${secDeducted.toLocaleString()}</span></div>
        <div class="sr"><span style="color:var(--text2)">Remaining to deduct</span><span style="color:${secDone?'#34d399':'#fb923c'};font-weight:700">${secDone?'Rs0 — Complete':'Rs'+secRemaining.toLocaleString()}</span></div>
        ${secDocs?`<div class="sr"><span style="color:var(--text2)">Security documents</span><span class="badge bb"><i class="ti ti-file-check"></i> Submitted</span></div>`:''}
        ${st.security_pct>0&&!secDone?`<div class="tm" style="margin-top:8px"><i class="ti ti-info-circle"></i> Deducted at ${st.security_pct}% of net salary each month until complete.</div>`:''}
       `}
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="ct"><i class="ti ti-id-badge-2"></i> Employment Details</div>
      <div class="sr"><span style="color:var(--text2)">Designation</span><span>${st.designation}</span></div>
      <div class="sr"><span style="color:var(--text2)">Section</span><span><span class="sec-${st.section.toLowerCase()}">${st.section}</span></span></div>
      <div class="sr"><span style="color:var(--text2)">Joining Date</span><span>${fmtJoined(st)}</span></div>
      <div class="sr"><span style="color:var(--text2)">Current Basic Salary</span><span>Rs${(st.salary||0).toLocaleString()}</span></div>
      <div class="sr"><span style="color:var(--text2)">Next Increment</span><span>${incrDate?formatIncrDate(incrDate)+incrBadge:'—'}</span></div>
      ${hasAcc?`<div class="fsep"><i class="ti ti-building-bank"></i> Bank Account</div>
        ${st.bank_name?`<div class="sr"><span style="color:var(--text2)">Bank</span><span>${st.bank_name}</span></div>`:''}
        ${st.account_title?`<div class="sr"><span style="color:var(--text2)">Title</span><span>${st.account_title}</span></div>`:''}
        ${st.account_no?`<div class="sr"><span style="color:var(--text2)">Account No / IBAN</span><span style="word-break:break-all">${st.account_no}</span></div>`:''}`
        :`<div class="tm" style="margin-top:10px"><i class="ti ti-info-circle"></i> No bank account on file — ask the admin to add it.</div>`}
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="ct"><i class="ti ti-calendar-check"></i> Leave Balance — ${year}</div>
      <div class="quota-grid" style="margin-bottom:0">
        <div class="quota-box${bal.annualLeft<=2?' warn':''}${bal.annualLeft===0?' danger':''}">
          <div class="qv" style="color:${bal.annualLeft===0?'#f87171':bal.annualLeft<=2?'#fb923c':'#34d399'}">${bal.annualLeft}</div>
          <div class="ql2">Annual Left</div><div class="ql2">${bal.annualUsed} used / ${bal.annualMax}</div>
        </div>
        <div class="quota-box${bal.sickLeft===0?' danger':''}">
          <div class="qv" style="color:${bal.sickLeft===0?'#f87171':'#60a5fa'}">${bal.sickLeft}</div>
          <div class="ql2">Sick Left</div><div class="ql2">${bal.sickUsed} used / ${bal.sickMax}</div>
        </div>
        <div class="quota-box">
          <div class="qv" style="color:#a78bfa">${bal.casualUsed}</div>
          <div class="ql2">Casual Taken</div><div class="ql2">Unpaid, no quota</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="ct"><i class="ti ti-calendar-stats"></i> Attendance — ${fmtMonthLabel(m)}
        ${monthPicker(m,{nav:true,max:pickMax,style:'width:150px;margin-left:auto'})}
      </div>
      ${attEmpty?`<div class="alert ai" style="margin-bottom:0"><i class="ti ti-calendar-off"></i> ${slReady?'No attendance recorded for this month.':'Attendance for '+fmtMonthLabel(m)+' isn\'t available yet — this month hasn\'t been processed.'}</div>`:`
      <div class="quota-grid">
        <div class="quota-box"><div class="qv" style="color:#60a5fa">${workingDays}</div><div class="ql2">Working Days</div></div>
        <div class="quota-box${(att.t_late||0)>2?' warn':''}"><div class="qv" style="color:${(att.t_late||0)>2?'#fb923c':'#34d399'}">${att.t_late||0}</div><div class="ql2">Total Lates</div></div>
        <div class="quota-box${(att.absent||0)>0?' danger':''}"><div class="qv" style="color:${(att.absent||0)>0?'#f87171':'#34d399'}">${att.absent||0}</div><div class="ql2">Absent</div></div>
      </div>
      <div class="sr"><span style="color:var(--text2)">Annual Leave</span><span>${att.annual_leave||0}</span></div>
      <div class="sr"><span style="color:var(--text2)">Sick Leave</span><span>${att.sick_leave||0}</span></div>
      <div class="sr"><span style="color:var(--text2)">Casual Leave (unpaid)</span><span>${att.casual_leave||0}</span></div>
      <div class="sr"><span style="color:var(--text2)">Half Leave</span><span>${att.hl||0}</span></div>`}
    </div>

    <div class="card" style="margin-bottom:0${monthsProcessed>0?';cursor:pointer':''}"${monthsProcessed>0?` onclick="openModal('year_breakdown','${u.id}|${year}')" title="Tap for the month-wise breakdown"`:''}>
      <div class="ct"><i class="ti ti-report-money"></i> ${year} Summary${monthsProcessed>0?'<i class="ti ti-chevron-right" style="margin-left:auto;color:var(--text3)"></i>':''}</div>

// Receipts may be a legacy date string (old one-click flow) or the new object
// { date, sig, by } where sig is a drawn-signature PNG data URL. Normalize both.
function getReceipt(m,sid){
  const r=(DB.receipts[m]||{})[sid];
  if(r==null) return null;
  if(typeof r==='string') return {date:r, hasSig:false, inlineSig:null, by:''};
  // sig may be a boolean flag (image stored separately) or, for any legacy
  // inline record, the data URL itself.
  const inline=(typeof r.sig==='string'&&r.sig.indexOf('data:')===0)?r.sig:null;
  return {date:r.date||'', hasSig:!!r.sig, inlineSig:inline, by:r.by||''};
}
function receiptDate(m,sid){const r=getReceipt(m,sid);return r?r.date:null;}
// Stamp shown once a receipt is signed. The signature image is loaded on demand
// (via "View signature") so it never bloats the always-synced receipts node.
function signedStampHTML(rec,m,sid){
  return `<div class="stamp"><i class="ti ti-check-circle"></i> Receipt signed on ${rec.date}</div>

    </div>`:''}`;
}

// ─── SUPER-ADMIN DATA ARCHIVE (export + delete) ────────────────
// Month-keyed DB fields that hold per-month records. Used by delete + scope checks.
const MONTH_KEYED_FIELDS=['attendance','salary_sheets','approvals','releases',
  'receipts','staff_releases','release_delegations','release_by','staff_approvals'];
// Every month (YYYY-MM) that has any stored data, newest first.
function allDataMonths(){
  const set=new Set();
  MONTH_KEYED_FIELDS.forEach(f=>Object.keys(DB[f]||{}).forEach(m=>set.add(m)));
  (DB.custom_deds||[]).forEach(c=>{if(c.month)set.add(c.month);});
  (DB.custom_earnings||[]).forEach(c=>{if(c.month)set.add(c.month);});
  return [...set].sort().reverse();
}
function allDataYears(){
  const set=new Set(allDataMonths().map(m=>m.split('-')[0]));
  set.add(String(new Date().getFullYear()));
  return [...set].sort().reverse();
}
function monthsInYear(y){ return allDataMonths().filter(m=>m.startsWith(y+'-')).sort(); }
// A month "counts" for export only once its salary sheet has been generated
// (issued). Stray attendance typed ahead for a future month does NOT qualify.
function staffIssued(m,sid){ return !!((DB.salary_sheets[m]||{})[sid]); }
// A staff member's salary for a month is "ready" to show once the admin has generated
// the sheet OR the salary has been released — never a phantom/un-processed month.
function salaryReady(sid, m){
  return staffIssued(m,sid) || staffReleased(m,sid);
}
// Latest month in this staff member's SALARY record — a generated sheet or a release.
// Everything the staff sees (salary AND attendance) is keyed off this, so the dashboard
// follows the admin's salary record: if the last salary is May, May is shown and nothing
// later. Attendance alone never makes a month "available" (it must not show a future
// month just because stray attendance exists).
function lastAvailableMonth(sid){
  const set=new Set();
  Object.keys(DB.salary_sheets||{}).forEach(m=>{ if((DB.salary_sheets[m]||{})[sid]) set.add(m); });
  Object.keys(DB.staff_releases||{}).forEach(m=>{ if((DB.staff_releases[m]||{})[sid]!=null) set.add(m); });
  const ms=[...set].sort();
  return ms.length?ms[ms.length-1]:null;
}
// On staff login, land on their latest available month (so nothing phantom shows).
function applyStaffDefaultMonth(user){
  if(user && user.role==='staff'){
    const lm=lastAvailableMonth(user.id);
    if(lm) APP.month=lm;
  }
}
// Months that have a generated salary sheet for at least one staff member.
function monthsWithSheets(){
  return Object.keys(DB.salary_sheets||{}).filter(m=>Object.keys(DB.salary_sheets[m]||{}).length).sort();
}
// Has the admin generated a salary sheet for this month?
function sheetGenerated(m){ return Object.keys(DB.salary_sheets[m]||{}).length>0; }
// Latest month with a generated salary sheet — caps the director's salary pages so
// they can't open/approve/release a month the admin hasn't processed yet.
function lastSheetMonth(){ const ms=monthsWithSheets(); return ms.length?ms[ms.length-1]:new Date().toISOString().slice(0,7); }
// Latest month that has generated attendance — caps the director's Attendance view.
function lastAttMonth(){
  const ms=Object.keys(DB.attendance||{}).filter(m=>Object.keys(DB.attendance[m]||{}).length).sort();
  return ms.length?ms[ms.length-1]:new Date().toISOString().slice(0,7);
}

// Download staff details as CSV
function downloadStaffDetailsCSV(){
  const scope=document.getElementById('dl_staff_scope').value;
  let staffToExport=[];
  if(scope==='all'){
    staffToExport=getStaffOnly();
  } else {
    const st=DB.staff_users.find(s=>s.id===scope);
    if(st) staffToExport=[st];
  }
  if(!staffToExport.length){toast('No staff members found.','warn');return;}
  
  const headers=['ID','Name','Username','Section','Designation','Basic Salary','Join Month','Increment Date','Security','Security %','Bank Name','Account Title','Account No'];
  const rows=staffToExport.map(s=>{
    return [
      s.id,
      s.name||'',
      s.username||'',
      s.section||'',
      s.designation||'',
      s.salary||0,
      s.join_month||'',
      s.increment_date||'',
      s.security?'Yes':'No',
      s.security_pct||0,
      s.bank_name||'',
      s.account_title||'',
      s.account_no||''
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  
  const csv=headers.join(',')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='staff_details_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Staff details downloaded successfully!','success');
}

// Gather → fetch signatures → open a print window with the full archive.
async function generateArchive(){
  const scope=document.getElementById('arc_scope').value;
  let months=[], staffIds=getStaffOnly().map(s=>s.id), title='';
  if(scope==='month'){
    const m=(document.getElementById('arc_month')||{}).value;
    if(!m){toast('Please pick a month.','warn');return;}
    if(!Object.keys(DB.salary_sheets[m]||{}).length){toast('No salary sheet has been generated for '+fmtMonthLabel(m)+'.','warn');return;}
    months=[m]; title='Salary & Attendance — '+fmtMonthLabel(m);
  } else if(scope==='year'){
    const y=document.getElementById('arc_year').value;
    months=monthsInYear(y).filter(m=>Object.keys(DB.salary_sheets[m]||{}).length);
    if(!months.length){toast('No salary sheets were generated in '+y+'.','warn');return;}
    title='Salary & Attendance — Year '+y;
  } else if(scope==='all'){
    months=monthsWithSheets(); // first issued month → last, all staff
    if(!months.length){toast('No salary sheets have been generated yet.','warn');return;}
    title='Complete Salary History — '+fmtMonthLabel(months[0])+' to '+fmtMonthLabel(months[months.length-1]);
  } else {
    const sid=document.getElementById('arc_staff').value;
    const y=document.getElementById('arc_staff_year').value;
    staffIds=[sid];
    months=(y?monthsInYear(y):monthsWithSheets()).filter(m=>staffIssued(m,sid)).sort();
    if(!months.length){toast('No issued salary records found for this staff member'+(y?' in '+y:'')+'.','warn');return;}
    const st=DB.staff_users.find(x=>x.id===sid)||{};
    title='Staff Record — '+(st.name||'')+(y?' ('+y+')':'');
  }
  await buildAndOpenArchive(title, months, staffIds);
}

// Fetch all needed signature images (separate path) then open the print window.
async function buildAndOpenArchive(title, months, staffIds){
  const sigJobs=[];
  months.forEach(m=>staffIds.forEach(sid=>{
    const rec=getReceipt(m,sid);
    if(rec&&rec.hasSig) sigJobs.push(fetchSigImage(m,sid).then(url=>({key:m+'|'+sid,url})));
  }));
  let sigMap={};
  try{ (await Promise.all(sigJobs)).forEach(r=>{if(r&&r.url)sigMap[r.key]=r.url;}); }
  catch(_){/* missing images just render as text */}
  openArchiveWindow(title, months, staffIds, sigMap);
}

function archiveStaffBlock(m, sid, sigMap){
  // Only include staff whose salary sheet was generated (issued) for this month.
  if(!staffIssued(m,sid)) return '';
  const sl=calcSlip(sid,m);
  const st=DB.staff_users.find(x=>x.id===sid)||{};
  const a=(DB.attendance[m]||{})[sid]||{};
  const released=staffReleased(m,sid);
  const rec=getReceipt(m,sid);
  const sig=rec&&rec.hasSig?sigMap[m+'|'+sid]:null;
  const ded=sl?[
    sl.lateDays>0?['Day Late ('+sl.effectiveLates+' late)','-Rs'+Math.round(sl.lateDays*sl.ppd).toLocaleString()]:null,
    sl.hlDays>0?['Half Leave ('+sl.hlRaw+')','-Rs'+Math.round(sl.hlDays*sl.ppd).toLocaleString()]:null,
    sl.dleaDays>0?['Day Leave ('+sl.absent+' absent + '+sl.casualLeave+' casual)','-Rs'+Math.round(sl.dleaDays*sl.ppd).toLocaleString()]:null,
    sl.secDed>0?['Security ('+sl.secPct+'%)','-Rs'+sl.secDed.toLocaleString()]:null,
    ...sl.cds.map(c=>[c.label,'-Rs'+c.amount.toLocaleString()]),
  ].filter(Boolean):[];
  const earns=sl?[
    ...sl.ces.map(c=>[c.label,'+Rs'+c.amount.toLocaleString()]),
  ].filter(Boolean):[];
  return `<div class="blk">
    <div class="bhd"><b>${st.name||sl&&sl.name||''}</b> — ${st.designation||''} <span class="sec">${st.section||''}</span></div>
    <div class="cols">
      <div class="col">
        <div class="lab">Attendance</div>
        <table class="mini">
          <tr><td>Total Late</td><td>${a.t_late||0}</td></tr>
          <tr><td>Absent</td><td>${a.absent||0}</td></tr>
          <tr><td>Casual Leave</td><td>${a.casual_leave||0}</td></tr>
          <tr><td>Annual Leave</td><td>${a.annual_leave||0}</td></tr>
          <tr><td>Sick Leave</td><td>${a.sick_leave||0}</td></tr>
          <tr><td>Half Leave</td><td>${a.hl||0}</td></tr>
        </table>
      </div>
      <div class="col">
        <div class="lab">Salary</div>
        <table class="mini">
          <tr><td>Basic Salary</td><td>Rs${sl?sl.salary.toLocaleString():'—'}</td></tr>
          ${earns.map(d=>`<tr><td>${d[0]}</td><td class="r" style="color:#059669">${d[1]}</td></tr>`).join('')}
          ${ded.map(d=>`<tr><td>${d[0]}</td><td class="r">${d[1]}</td></tr>`).join('')}
          <tr class="tot"><td>Net Salary</td><td>Rs${sl?sl.net.toLocaleString():'—'}</td></tr>
        </table>
      </div>
    </div>
    <div class="stat">
      <span>Status: <b>${released?'Released':'Not released'}</b></span>
      <span>Receipt: <b>${rec?'Signed on '+rec.date:'Not signed'}</b></span>
    </div>
    ${sig?`<div class="sig"><div class="lab">Signature</div><img src="${sig}"></div>`
        :(rec&&rec.hasSig?'<div class="sig"><span class="muted">[signature image unavailable]</span></div>':'')}
  </div>`;
}

// Month-keyed fields stored PER staff member ([m][sid]) — used for individual delete.
const PER_STAFF_MONTH_FIELDS=['attendance','salary_sheets','receipts','staff_releases',
  'release_delegations','release_by','staff_approvals'];
async function deleteArchiveData(){
  const scope=document.getElementById('del_scope').value;
  const target=document.getElementById('del_target').value; // '__all__' or a staff id
  let months=[], periodLabel='';
  if(scope==='month'){
    const m=(document.getElementById('del_month')||{}).value;
    if(!m){toast('Please pick a month to delete.','warn');return;}
    months=[m]; periodLabel=fmtMonthLabel(m);
  } else {
    const y=document.getElementById('del_year').value;
    months=monthsInYear(y);
    if(!months.length){toast('No data stored for '+y+'.','warn');return;}
    periodLabel='the entire year '+y;
  }
  const mset=new Set(months);
  const individual=target!=='__all__';
  const st=individual?(DB.staff_users.find(x=>x.id===target)||{}):null;
  const who=individual?(st.name||'this staff member'):'ALL staff';
  // The "Download PDF first" button always exports the COMPLETE history (every
  // issued month), so nothing is lost even if you only delete one period.
  const dlStaffIds=individual?[target]:getStaffOnly().map(s=>s.id);
  const dlMonths=individual?monthsWithSheets().filter(m=>staffIssued(m,target)):monthsWithSheets();
  const dlRange=dlMonths.length?(fmtMonthLabel(dlMonths[0])+' to '+fmtMonthLabel(dlMonths[dlMonths.length-1])):'';
  const dlTitle=(individual?('Complete Salary History — '+who):'Complete Salary History — all staff')+(dlRange?' ('+dlRange+')':'');
  openDeleteConfirm({
    heading:'Delete Data',
    message:`Permanently delete records for <b>${who}</b> — <b>${periodLabel}</b>.<br><br>This removes attendance, salary, releases, receipts &amp; signatures and <b>cannot be undone</b>.`,
    download:()=>buildAndOpenArchive(dlTitle, dlMonths, dlStaffIds),
    confirmLabel:'Delete Permanently',
    run: async ()=>{
      if(individual){
        PER_STAFF_MONTH_FIELDS.forEach(f=>months.forEach(m=>{ if(DB[f]&&DB[f][m]) delete DB[f][m][target]; }));
        DB.custom_deds=(DB.custom_deds||[]).filter(c=>!(mset.has(c.month)&&c.staffId===target));
        DB.custom_earnings=(DB.custom_earnings||[]).filter(c=>!(mset.has(c.month)&&c.staffId===target));
        months.forEach(m=>{try{FDB.ref(FB_ROOT+'/receipt_sigs/'+m+'/'+target).remove();}catch(_){}});
        for(const f of [...PER_STAFF_MONTH_FIELDS,'custom_deds','custom_earnings']) await saveField(f);
      } else {
        MONTH_KEYED_FIELDS.forEach(f=>months.forEach(m=>{ if(DB[f]) delete DB[f][m]; }));
        DB.custom_deds=(DB.custom_deds||[]).filter(c=>!mset.has(c.month));
        DB.custom_earnings=(DB.custom_earnings||[]).filter(c=>!mset.has(c.month));
        months.forEach(m=>{try{FDB.ref(FB_ROOT+'/receipt_sigs/'+m).remove();}catch(_){}});
        for(const f of [...MONTH_KEYED_FIELDS,'custom_deds','custom_earnings']) await saveField(f);
      }
      toast('Deleted records for '+who+' — '+periodLabel+'.','success');
    }
  });
}

// Completely remove one or more staff members and EVERYTHING tied to them,
// including their login account, across all months.
async function deleteStaffCompletely(){
  const ids=[...document.querySelectorAll('.del-staff-chk:checked')].map(c=>c.value);
  if(!ids.length){toast('Select at least one staff member to remove.','warn');return;}
  const idset=new Set(ids);
  const names=ids.map(id=>{const s=DB.staff_users.find(x=>x.id===id);return s?s.name:id;});
  const dlMonths=monthsWithSheets();
  openDeleteConfirm({
    heading:'Remove Staff Completely',
    message:`Permanently remove <b>${ids.length}</b> staff member(s) and <b>ALL</b> their data — login account (username &amp; password), attendance, salary, receipts &amp; signatures across <b>every</b> month, custom deductions, leave overrides and approver roles.<br><br>• ${names.join('<br>• ')}<br><br><b>This cannot be undone.</b>`,
    download:()=>buildAndOpenArchive('Staff Records — '+names.join(', '), dlMonths, ids),
    confirmLabel:'Remove Staff & All Data',
    run: async ()=>{
      DB.staff_users=DB.staff_users.filter(u=>!idset.has(u.id));
      PER_STAFF_MONTH_FIELDS.forEach(f=>Object.keys(DB[f]||{}).forEach(m=>{ ids.forEach(id=>{ if(DB[f][m]) delete DB[f][m][id]; }); }));
      DB.custom_deds=(DB.custom_deds||[]).filter(c=>!idset.has(c.staffId));
      DB.custom_earnings=(DB.custom_earnings||[]).filter(c=>!idset.has(c.staffId));
      ids.forEach(id=>{ if(DB.leave_overrides) delete DB.leave_overrides[id]; });
      Object.keys(DB.approver_map||{}).forEach(k=>{ if(idset.has(DB.approver_map[k])) delete DB.approver_map[k]; });
      allDataMonths().forEach(m=>ids.forEach(id=>{try{FDB.ref(FB_ROOT+'/receipt_sigs/'+m+'/'+id).remove();}catch(_){}}));
      for(const f of [...PER_STAFF_MONTH_FIELDS,'staff_users','custom_deds','custom_earnings','leave_overrides','approver_map']) await saveField(f);
      toast('Completely removed: '+names.join(', ')+'.','success');
    }
  });
}
